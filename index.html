<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chrono Keep Board</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --paper: #fff8c7;
      --panel: #ffffff;
      --bg: #f6f7f2;
      --accent: #1a73e8;
      --accent-2: #0b8043;
      --warn: #fbbc04;
      --rose: #d93025;
      --shadow: 0 12px 28px rgba(60, 64, 67, .16);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,.68), rgba(255,255,255,.68)),
        radial-gradient(circle at 30px 30px, rgba(32,33,36,.07) 1px, transparent 1.5px);
      background-size: auto, 22px 22px;
      color: var(--ink);
      overflow: hidden;
      font-size: 13px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      height: 38px;
      border-radius: 19px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      white-space: nowrap;
      font-size: 13px;
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(60,64,67,.16); }
    button:active { transform: translateY(0); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.icon { width: 38px; padding: 0; justify-content: center; }
    button.active { border-color: var(--accent); background: #e8f0fe; color: #174ea6; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .app.side-collapsed .main {
      grid-template-columns: 1fr 0;
    }

    .app.side-collapsed .side {
      transform: translateX(100%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 210px;
      font-weight: 720;
      font-size: 16px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #fdd663, #34a853);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .search {
      flex: 1;
      max-width: 620px;
      position: relative;
    }

    .search input {
      width: 100%;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 20px;
      background: #f1f3f4;
      padding: 0 16px 0 42px;
      outline: none;
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 10px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .sort-control {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 360px;
    }

    .board-shell {
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .board {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 28px;
    }

    .canvas {
      position: relative;
      width: 2100px;
      height: 1280px;
      background:
        linear-gradient(90deg, rgba(218,220,224,.55) 1px, transparent 1px),
        linear-gradient(rgba(218,220,224,.55) 1px, transparent 1px);
      background-size: 44px 44px;
      border: 1px solid rgba(218,220,224,.8);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }

    .canvas.tag-3d {
      perspective: 1100px;
      transform-style: preserve-3d;
      overflow: visible;
      background-size: 56px 56px;
    }

    .canvas.tag-3d .note {
      display: none;
    }

    .tag3d-webgl {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: block;
      background: #111827;
    }

    .tag-3d-controls {
      position: sticky;
      top: 58px;
      left: 10px;
      z-index: 18;
      width: fit-content;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      padding: 8px;
      border: 1px solid rgba(218,220,224,.9);
      border-radius: 8px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 6px 18px rgba(60,64,67,.12);
    }

    .depth-mode {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 0 9px;
      background: #fff;
      font-size: 12px;
    }

    .view-cube {
      display: grid;
      grid-template-columns: repeat(3, 28px);
      grid-template-rows: repeat(3, 28px);
      gap: 2px;
      padding: 4px;
      border-radius: 6px;
      background: #f1f3f4;
      box-shadow: inset -3px -3px 0 rgba(60,64,67,.12), inset 3px 3px 0 rgba(255,255,255,.8);
    }

    .view-cube button {
      width: 28px;
      height: 28px;
      min-width: 0;
      padding: 0;
      border-radius: 4px;
      justify-content: center;
      font-size: 10px;
      font-weight: 760;
      background: #fff;
    }

    .view-cube button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tag-shelf {
      position: sticky;
      top: 10px;
      left: 10px;
      z-index: 15;
      width: fit-content;
      max-width: min(920px, calc(100vw - 420px));
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      padding: 8px;
      border: 1px solid rgba(218,220,224,.9);
      border-radius: 22px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 18px rgba(60,64,67,.12);
      backdrop-filter: blur(10px);
    }

    .tag-create {
      width: 116px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 9px;
      outline: none;
      background: #fff;
      font-size: 12px;
    }

    .tag-sticker {
      min-height: 28px;
      height: auto;
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid rgba(60,64,67,.16);
      background: #fef7e0;
      color: #5f4700;
      box-shadow: 0 2px 6px rgba(60,64,67,.12);
      font-size: 12px;
      font-weight: 740;
      cursor: grab;
      max-width: 170px;
      overflow-wrap: anywhere;
    }

    .tag-sticker.attached {
      min-height: 22px;
      padding: 3px 8px;
      font-size: 11px;
      background: rgba(255,255,255,.74);
      color: var(--ink);
    }

    .tag-sticker.dragging {
      opacity: .55;
    }

    .note.drop-target {
      outline: 3px solid rgba(26,115,232,.32);
      outline-offset: 3px;
    }

    .note {
      position: absolute;
      width: 260px;
      min-height: 188px;
      border-radius: 8px;
      padding: 12px;
      background: var(--paper);
      box-shadow: 0 3px 8px rgba(60,64,67,.18);
      border: 2px solid transparent;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
      resize: both;
      overflow: hidden;
    }

    .note.collapsed {
      min-height: 58px;
      height: 58px !important;
      resize: none;
      grid-template-rows: auto;
    }

    .note.collapsed .note-meta,
    .note.collapsed textarea,
    .note.collapsed .note-body {
      display: none;
    }

    .note.selected {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      z-index: 8;
    }

    .note.pinned::before {
      content: "";
      position: absolute;
      top: 8px;
      right: 10px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--rose);
      box-shadow: 0 0 0 2px rgba(255,255,255,.65);
    }

    .note-head {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: grab;
      min-height: 26px;
      padding-right: 18px;
    }

    .note-title {
      width: 100%;
      border: 0;
      background: transparent;
      font-weight: 760;
      color: var(--ink);
      outline: none;
      font-size: 13px;
    }

    .note-meta {
      color: rgba(32,33,36,.65);
      font-size: 10px;
      line-height: 1.18;
    }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag-input {
      width: 100%;
      min-width: 0;
      height: 28px;
      border: 1px solid rgba(60,64,67,.16);
      border-radius: 14px;
      background: rgba(255,255,255,.56);
      padding: 0 9px;
      outline: none;
      font-size: 12px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 10px;
      padding: 2px 7px;
      background: rgba(32,33,36,.08);
      color: var(--muted);
      font-size: 10px;
      font-weight: 680;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .note textarea {
      width: 100%;
      min-height: 86px;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--ink);
      line-height: 1.22;
      font-size: 12px;
    }

    .note-images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      max-height: 128px;
      overflow: auto;
    }

    .note-images img {
      width: 100%;
      height: 74px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
    }

    .child-notes {
      position: relative;
      margin: 4px 0 8px;
      min-height: 38px;
      height: var(--child-area-height, 190px);
      max-height: 260px;
      overflow: auto;
      border-radius: 8px;
    }

    .child-note {
      position: absolute;
      width: 190px;
      min-height: 132px;
      border: 1px solid rgba(60,64,67,.18);
      border-left: 4px solid var(--accent-2);
      border-radius: 7px;
      background: rgba(255,255,255,.58);
      padding: 7px;
      display: grid;
      gap: 5px;
    }

    .child-note.collapsed {
      min-height: 38px;
      height: 38px;
      overflow: hidden;
    }

    .child-note.collapsed .child-text,
    .child-note.collapsed .child-meta,
    .child-note.collapsed .child-actions,
    .child-note.collapsed .child-tags,
    .child-note.collapsed .child-notes {
      display: none;
    }

    .child-note.dragging {
      opacity: .86;
      z-index: 12;
      box-shadow: var(--shadow);
    }

    .child-head {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 5px;
    }

    .child-move {
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 9px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.66);
      cursor: grab;
      color: var(--muted);
    }

    .child-note.selected {
      outline: 2px solid var(--accent);
      background: rgba(232,240,254,.86);
    }

    .child-note input,
    .child-note textarea {
      width: 100%;
      border: 0;
      background: transparent;
      outline: none;
      color: var(--ink);
    }

    .child-note input {
      font-size: 11px;
      font-weight: 760;
    }

    .child-note textarea {
      min-height: 34px;
      font-size: 11px;
      line-height: 1.2;
      resize: vertical;
    }

    .child-meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.12;
    }

    .child-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .child-actions button {
      height: 26px;
      width: 26px;
      border-radius: 13px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.75);
    }

    .note-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .note-actions button {
      height: 30px;
      width: 30px;
      border-radius: 15px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.72);
    }

    .side {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      transition: transform .22s ease;
    }

    .side-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .side-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .side-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .side-head p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.22;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px 0;
    }

    .tabs button {
      flex: 1;
      justify-content: center;
      height: 30px;
      border-radius: 17px;
      font-size: 12px;
    }

    .panel {
      min-height: 0;
      overflow: auto;
      padding: 12px 14px 18px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .event {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .event-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 720;
      background: #f1f3f4;
      color: #3c4043;
    }

    .pill.full { background: #e8f0fe; color: #174ea6; }
    .pill.paragraph { background: #e6f4ea; color: #137333; }
    .pill.word { background: #fef7e0; color: #b06000; }
    .pill.create { background: #fce8e6; color: #a50e0e; }

    .event-note {
      font-weight: 720;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .event-body {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.22;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 88px;
      overflow: auto;
    }

    .tree-list {
      display: grid;
      gap: 6px;
      font-size: 11px;
      line-height: 1.22;
    }

    .tree-item {
      border-left: 2px solid var(--line);
      padding: 5px 0 5px 10px;
      background: linear-gradient(90deg, rgba(241,243,244,.72), transparent);
    }

    .tree-title {
      font-weight: 760;
      margin-bottom: 3px;
      word-break: break-word;
    }

    .tree-note-link {
      height: auto;
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
      color: var(--ink);
      justify-content: start;
      text-align: left;
      white-space: normal;
    }

    .tree-note-link:hover {
      transform: none;
      box-shadow: none;
      color: var(--accent);
    }

    .tree-text {
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tree-images {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tree-image-link {
      height: 26px;
      border: 0;
      border-radius: 13px;
      padding: 0 9px;
      background: #e8f0fe;
      color: #174ea6;
      box-shadow: none;
      font-size: 12px;
      text-decoration: underline;
    }

    .timeline {
      position: fixed;
      inset: 58px 0 0 0;
      background: #111827;
      z-index: 40;
      display: none;
      grid-template-rows: 54px 1fr;
      color: #fff;
    }

    .timeline.open { display: grid; }

    .timeline-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.14);
      background: rgba(17,24,39,.92);
    }

    .timeline-bar h2 {
      margin: 0;
      font-size: 17px;
      min-width: 210px;
    }

    .timeline-bar button, .timeline-bar select {
      background: rgba(255,255,255,.1);
      color: #fff;
      border-color: rgba(255,255,255,.22);
    }

    .timeline-bar select {
      height: 38px;
      border-radius: 19px;
      padding: 0 12px;
      outline: none;
    }

    .timeline-help {
      margin-left: auto;
      color: rgba(255,255,255,.7);
      font-size: 12px;
    }

    #timeline3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    .empty {
      color: var(--muted);
      line-height: 1.55;
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.65);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #202124;
      color: #fff;
      border-radius: 20px;
      padding: 10px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 70;
      font-size: 13px;
    }

    .toast.show { opacity: 1; }

    .hidden-file { display: none; }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(17,24,39,.72);
    }

    .image-modal.open { display: grid; }

    .image-dialog {
      width: min(960px, 94vw);
      max-height: 90vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .image-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 720;
    }

    .image-dialog img {
      display: block;
      width: 100%;
      max-height: calc(90vh - 60px);
      object-fit: contain;
      background: #111827;
    }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-rows: auto 1fr; }
      .topbar { flex-wrap: wrap; }
      .brand { min-width: 0; width: 100%; }
      .search { order: 3; max-width: none; width: 100%; flex-basis: 100%; }
      .main { grid-template-columns: 1fr; }
      .board-shell { min-height: 68vh; }
      .side { border-left: 0; border-top: 1px solid var(--line); min-height: 420px; }
      .app.side-collapsed .side { display: none; }
      .tag-shelf { max-width: calc(100vw - 56px); }
      .timeline { inset: 0; }
      .timeline-bar { flex-wrap: wrap; height: auto; align-items: start; }
      .timeline-help { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 3h9l3 3v15H6V3z" fill="white" opacity=".92"/>
            <path d="M15 3v4h4" stroke="#202124" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 11h6M9 15h5" stroke="#202124" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </div>
        Chrono Keep Board
      </div>
      <label class="search" aria-label="検索">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" placeholder="メモを検索">
      </label>
      <div class="toolbar">
        <select id="arrangeSelect" class="sort-control" title="整列">
          <option value="manual">手動配置</option>
          <option value="color">色順に整列</option>
          <option value="tag">タグ順に整列</option>
          <option value="updated">最新更新順に整列</option>
        </select>
        <select id="depthModeSelect" class="sort-control" title="3D奥行き" hidden>
          <option value="even">奥行き均等</option>
          <option value="time">時系列</option>
        </select>
        <button id="addNote" class="primary" title="新規メモ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          新規
        </button>
        <button id="importKeepBtn" title="Google Keepを取り込み">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12M8 11l4 4 4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Keep取込
        </button>
        <button id="historyBtn" title="履歴">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5M12 7v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          履歴
        </button>
        <button id="toggleSideBtn" title="履歴パネル">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 5h16v14H4zM15 5v14" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          パネル
        </button>
        <button id="timelineBtn" title="3D年表">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 18 12 6l8 12M4 18h16M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          3D年表
        </button>
      </div>
    </header>

    <main class="main">
      <section class="board-shell" aria-label="2次元付箋ボード">
        <div class="board" id="boardScroll">
          <div class="canvas" id="canvas"></div>
        </div>
      </section>

      <aside class="side" id="sidePanel">
        <div class="side-head">
          <div class="side-head-top">
            <h2 id="sideTitle">履歴</h2>
            <button id="closeSideBtn" class="icon" title="履歴パネルを閉じる">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <p id="sideSummary">メモを選ぶと、作成、本文全体、段落、言葉単位の更新履歴を確認できます。</p>
        </div>
        <div class="tabs">
          <button id="tabSelected" class="active">選択メモ</button>
          <button id="tabAll">全体</button>
          <button id="tabTree">ツリー</button>
        </div>
        <div class="panel">
          <div id="historyList" class="history-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <section class="timeline" id="timelineOverlay" aria-label="3D年表">
    <div class="timeline-bar">
      <h2>3D年表</h2>
      <select id="timelineScope">
        <option value="all">全粒度</option>
        <option value="note">メモ単位</option>
        <option value="paragraph">段落単位</option>
        <option value="word">言葉単位</option>
      </select>
      <button id="timelineReset">視点リセット</button>
      <button id="closeTimeline">閉じる</button>
      <div class="timeline-help">ドラッグで回転、ホイールでズーム。横軸が時間、奥行きが粒度です。</div>
    </div>
    <canvas id="timeline3d"></canvas>
  </section>

  <input id="imageInput" class="hidden-file" type="file" accept="image/*" multiple>
  <input id="keepImportInput" class="hidden-file" type="file" webkitdirectory directory multiple>
  <section class="image-modal" id="imageModal" aria-label="画像プレビュー">
    <div class="image-dialog">
      <div class="image-dialog-head">
        <span id="imageModalTitle">画像</span>
        <button id="closeImageModal">閉じる</button>
      </div>
      <img id="imageModalImg" alt="メモに貼り込んだ画像">
    </div>
  </section>
  <div id="toast" class="toast"></div>

  <script type="module">
    const STORE_KEY = "chrono-keep-board-v2";
    const palette = ["#fff8c7", "#d7f0ff", "#e2f4d7", "#fce3ef", "#e8e0ff", "#ffe3c2", "#dff3ec"];
    const typeLabel = { create: "作成", full: "本文全体", paragraph: "段落", word: "言葉" };
    const typeDepth = { create: -90, full: -30, paragraph: 35, word: 100 };
    const typeColor = { create: 0xea4335, full: 0x4285f4, paragraph: 0x34a853, word: 0xfbbc04 };

    let state = loadState();
    let selectedId = state.selectedId || state.notes[0]?.id || null;
    let historyMode = "selected";
    let drag = null;
    let tagDrag = null;
    let imageTargetId = null;
    let threeRuntime = null;
    let tag3dRuntime = null;
    let tag3dView = "front";

    const el = {
      app: document.getElementById("app"),
      canvas: document.getElementById("canvas"),
      arrangeSelect: document.getElementById("arrangeSelect"),
      depthModeSelect: document.getElementById("depthModeSelect"),
      addNote: document.getElementById("addNote"),
      importKeepBtn: document.getElementById("importKeepBtn"),
      keepImportInput: document.getElementById("keepImportInput"),
      historyBtn: document.getElementById("historyBtn"),
      toggleSideBtn: document.getElementById("toggleSideBtn"),
      closeSideBtn: document.getElementById("closeSideBtn"),
      timelineBtn: document.getElementById("timelineBtn"),
      historyList: document.getElementById("historyList"),
      tabSelected: document.getElementById("tabSelected"),
      tabAll: document.getElementById("tabAll"),
      tabTree: document.getElementById("tabTree"),
      searchInput: document.getElementById("searchInput"),
      imageInput: document.getElementById("imageInput"),
      imageModal: document.getElementById("imageModal"),
      imageModalTitle: document.getElementById("imageModalTitle"),
      imageModalImg: document.getElementById("imageModalImg"),
      closeImageModal: document.getElementById("closeImageModal"),
      toast: document.getElementById("toast"),
      timelineOverlay: document.getElementById("timelineOverlay"),
      timelineScope: document.getElementById("timelineScope"),
      timelineReset: document.getElementById("timelineReset"),
      closeTimeline: document.getElementById("closeTimeline"),
      timeline3d: document.getElementById("timeline3d"),
      sideTitle: document.getElementById("sideTitle"),
      sideSummary: document.getElementById("sideSummary")
    };

    if (state.notes.length === 0) {
      createNote({
        title: "最初のメモ",
        text: "ここに文章を書きます。\n\n段落ごとの更新と、言葉ごとの履歴が自動で残ります。",
        x: 90,
        y: 90,
        color: palette[0]
      });
      createNote({
        title: "画像メモ",
        text: "画像ボタンから写真やスクリーンショットを貼り込めます。",
        x: 390,
        y: 130,
        color: palette[1]
      });
    }

    render();

    el.toggleSideBtn.addEventListener("click", () => {
      el.app.classList.toggle("side-collapsed");
    });

    el.closeSideBtn.addEventListener("click", () => {
      el.app.classList.add("side-collapsed");
    });

    el.arrangeSelect.addEventListener("change", () => {
      el.depthModeSelect.hidden = el.arrangeSelect.value !== "tag";
      if (el.arrangeSelect.value !== "manual") {
        arrangeNotes(el.arrangeSelect.value);
      } else {
        tag3dView = "front";
        renderNotes();
      }
    });

    el.depthModeSelect.addEventListener("change", () => {
      if (el.arrangeSelect.value === "tag") arrangeNotes("tag");
    });

    el.addNote.addEventListener("click", () => {
      const note = createNote({
        title: "無題のメモ",
        text: "",
        x: 120 + state.notes.length * 24,
        y: 120 + state.notes.length * 18,
        color: palette[state.notes.length % palette.length]
      });
      selectedId = note.id;
      persist();
      render();
      toast("新しいメモを作成しました");
    });

    el.importKeepBtn.addEventListener("click", () => {
      el.keepImportInput.click();
    });

    el.keepImportInput.addEventListener("change", async () => {
      const files = Array.from(el.keepImportInput.files || []);
      if (files.length === 0) return;
      try {
        const imported = await importGoogleKeepFiles(files);
        persist();
        render();
        toast(`${imported} 件のKeepメモを取り込みました`);
      } catch (error) {
        console.error(error);
        toast("Keepの取り込みに失敗しました");
      } finally {
        el.keepImportInput.value = "";
      }
    });

    el.historyBtn.addEventListener("click", () => {
      el.app.classList.remove("side-collapsed");
      historyMode = "selected";
      el.tabSelected.classList.add("active");
      el.tabAll.classList.remove("active");
      el.tabTree.classList.remove("active");
      document.getElementById("sidePanel").scrollIntoView({ block: "nearest", behavior: "smooth" });
      renderSidePanel();
    });

    el.timelineBtn.addEventListener("click", openTimeline);
    el.closeTimeline.addEventListener("click", closeTimeline);
    el.timelineReset.addEventListener("click", () => {
      if (threeRuntime) {
        threeRuntime.camera.position.set(0, 360, 620);
        threeRuntime.controls.target.set(0, 0, 0);
        threeRuntime.controls.update();
      }
    });
    el.timelineScope.addEventListener("change", () => renderTimelineScene());

    el.tabSelected.addEventListener("click", () => {
      historyMode = "selected";
      el.tabSelected.classList.add("active");
      el.tabAll.classList.remove("active");
      el.tabTree.classList.remove("active");
      renderSidePanel();
    });

    el.tabAll.addEventListener("click", () => {
      historyMode = "all";
      el.tabAll.classList.add("active");
      el.tabSelected.classList.remove("active");
      el.tabTree.classList.remove("active");
      renderSidePanel();
    });

    el.tabTree.addEventListener("click", () => {
      historyMode = "tree";
      el.tabTree.classList.add("active");
      el.tabSelected.classList.remove("active");
      el.tabAll.classList.remove("active");
      renderSidePanel();
    });

    el.searchInput.addEventListener("input", renderNotes);

    el.historyList.addEventListener("click", (event) => {
      const imageLink = event.target.closest("[data-image-note]");
      if (imageLink) {
        const note = findNote(imageLink.dataset.imageNote);
        const image = note?.images[Number(imageLink.dataset.imageIndex)];
        if (image) openImageModal(image, note.title, Number(imageLink.dataset.imageIndex) + 1);
        return;
      }

      const noteLink = event.target.closest("[data-tree-note]");
      if (noteLink) {
        selectedId = noteLink.dataset.treeNote;
        historyMode = "selected";
        el.tabSelected.classList.add("active");
        el.tabAll.classList.remove("active");
        el.tabTree.classList.remove("active");
        persist();
        render();
      }
    });

    el.closeImageModal.addEventListener("click", closeImageModal);
    el.imageModal.addEventListener("click", (event) => {
      if (event.target === el.imageModal) closeImageModal();
    });

    el.imageInput.addEventListener("change", async () => {
      const note = findNote(imageTargetId);
      if (!note || el.imageInput.files.length === 0) return;
      const files = Array.from(el.imageInput.files).slice(0, 8);
      const images = await Promise.all(files.map(readFileAsDataURL));
      note.images.push(...images);
      recordEvent(note, "full", "画像を追加", `画像 ${images.length} 件を貼り込みました`);
      note.updatedAt = now();
      persist();
      render();
      el.imageInput.value = "";
      toast("画像を貼り込みました");
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && el.imageModal.classList.contains("open")) closeImageModal();
      if (event.key === "Escape" && el.timelineOverlay.classList.contains("open")) closeTimeline();
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "n") {
        event.preventDefault();
        el.addNote.click();
      }
    });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return { notes: [], selectedId: null, tags: [] };
        const parsed = JSON.parse(raw);
        const notes = Array.isArray(parsed.notes) ? parsed.notes.map(normalizeNote) : [];
        const tags = Array.isArray(parsed.tags) ? parsed.tags : uniqueTags(notes);
        return { notes, selectedId: parsed.selectedId || null, tags };
      } catch {
        return { notes: [], selectedId: null, tags: [] };
      }
    }

    function normalizeNote(note) {
      return {
        ...note,
        parentId: note.parentId || null,
        images: Array.isArray(note.images) ? note.images : [],
        tags: Array.isArray(note.tags) ? note.tags : [],
        collapsed: Boolean(note.collapsed),
        history: Array.isArray(note.history) ? note.history : [],
        lastText: note.lastText ?? note.text ?? "",
        localX: Number.isFinite(note.localX) ? note.localX : 8,
        localY: Number.isFinite(note.localY) ? note.localY : 8,
        w: note.w || 260,
        h: note.h || 188
      };
    }

    function persist() {
      state.selectedId = selectedId;
      state.tags = uniqueTags(state.notes, state.tags);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function now() {
      return new Date().toISOString();
    }

    function uid() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function createNote(seed = {}) {
      const createdAt = now();
      const note = {
        id: uid(),
        parentId: seed.parentId || null,
        title: seed.title || "無題のメモ",
        text: seed.text || "",
        images: [],
        tags: seed.tags || [],
        collapsed: false,
        x: seed.x ?? 80,
        y: seed.y ?? 80,
        localX: seed.localX ?? 8,
        localY: seed.localY ?? 8,
        w: 260,
        h: 188,
        color: seed.color || palette[0],
        pinned: false,
        createdAt,
        updatedAt: createdAt,
        history: [],
        lastText: seed.text || ""
      };
      if (note.parentId) {
        const parentIndex = state.notes.findIndex(item => item.id === note.parentId);
        state.notes.splice(parentIndex + 1, 0, note);
      } else {
        state.notes.unshift(note);
      }
      recordEvent(note, "create", "メモ作成", note.text || note.title, createdAt);
      recordTextHistory(note, "", note.text || "", createdAt);
      if (note.parentId) {
        const parent = findNote(note.parentId);
        if (parent) {
          parent.updatedAt = createdAt;
          recordEvent(parent, "full", "子メモ追加", note.title, createdAt);
        }
      }
      selectedId = note.id;
      persist();
      return note;
    }

    function createChildNote(parent) {
      const child = createNote({
        parentId: parent.id,
        title: "子メモ",
        text: "",
        localX: 10 + childNotes(parent.id).length * 18,
        localY: 10 + childNotes(parent.id).length * 18,
        color: parent.color
      });
      selectedId = child.id;
      persist();
      render();
      toast("子メモを貼り込みました");
    }

    async function importGoogleKeepFiles(files) {
      const jsonFiles = files.filter(file => file.name.toLowerCase().endsWith(".json"));
      const imageFiles = new Map(
        files
          .filter(file => file.type.startsWith("image/"))
          .map(file => [file.name, file])
      );
      let imported = 0;

      for (const file of jsonFiles) {
        const data = JSON.parse(await file.text());
        const note = googleKeepToNote(data, imported);
        note.images = await importKeepImages(data, imageFiles);
        state.notes.unshift(note);
        imported += 1;
      }

      selectedId = state.notes[0]?.id || selectedId;
      arrangeNotes("updated", false);
      return imported;
    }

    function googleKeepToNote(data, index) {
      const createdAt = keepTimestamp(data.createdTimestampUsec || data.createdTimestampMillis || data.createdAt);
      const updatedAt = keepTimestamp(data.userEditedTimestampUsec || data.updatedTimestampUsec || data.updatedAt) || createdAt;
      const title = data.title || "Google Keepメモ";
      const listText = Array.isArray(data.listContent)
        ? data.listContent.map(item => `${item.isChecked ? "[x]" : "[ ]"} ${item.text || ""}`).join("\n")
        : "";
      const text = [data.textContent || "", listText].filter(Boolean).join("\n");
      const note = {
        id: uid(),
        parentId: null,
        title,
        text,
        images: [],
        tags: keepLabels(data),
        collapsed: false,
        x: 90 + (index % 4) * 310,
        y: 90 + Math.floor(index / 4) * 240,
        localX: 8,
        localY: 8,
        w: 280,
        h: 210,
        color: keepColor(data.color),
        pinned: Boolean(data.isPinned),
        createdAt,
        updatedAt,
        history: [],
        lastText: text
      };
      recordEvent(note, "create", "Google Keepから取込", title, createdAt);
      recordTextHistory(note, "", text, updatedAt);
      if (note.tags.length) recordEvent(note, "full", "Keepラベル取込", note.tags.join(", "), updatedAt);
      return note;
    }

    async function importKeepImages(data, imageFiles) {
      const attachments = Array.isArray(data.attachments) ? data.attachments : [];
      const images = [];
      for (const attachment of attachments) {
        const path = attachment.filePath || attachment.file_path || attachment.name || "";
        const filename = path.split(/[\\/]/).pop();
        const file = imageFiles.get(filename);
        if (file) images.push(await readFileAsDataURL(file));
      }
      return images;
    }

    function keepLabels(data) {
      if (!Array.isArray(data.labels)) return [];
      return data.labels
        .map(label => typeof label === "string" ? label : label.name)
        .filter(Boolean)
        .slice(0, 8);
    }

    function keepTimestamp(value) {
      if (!value) return now();
      const num = Number(value);
      if (Number.isFinite(num)) {
        const millis = num > 9999999999999 ? Math.floor(num / 1000) : num;
        return new Date(millis).toISOString();
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? now() : parsed.toISOString();
    }

    function keepColor(color) {
      const map = {
        DEFAULT: palette[0],
        WHITE: "#fff8c7",
        RED: "#fce3ef",
        ORANGE: "#ffe3c2",
        YELLOW: "#fff8c7",
        GREEN: "#e2f4d7",
        TEAL: "#dff3ec",
        BLUE: "#d7f0ff",
        GRAY: "#f1f3f4"
      };
      return map[String(color || "DEFAULT").toUpperCase()] || palette[0];
    }

    function recordEvent(note, type, label, value, at = now()) {
      note.history.push({
        id: uid(),
        type,
        label,
        value: String(value || ""),
        at,
        noteId: note.id,
        noteTitle: note.title
      });
    }

    function recordTextHistory(note, oldText, newText, at = now()) {
      if (oldText === newText) return;
      recordEvent(note, "full", "本文更新", newText, at);

      const oldParagraphs = splitParagraphs(oldText);
      const newParagraphs = splitParagraphs(newText);
      newParagraphs.forEach((paragraph, index) => {
        if (paragraph && paragraph !== oldParagraphs[index]) {
          recordEvent(note, "paragraph", `段落 ${index + 1}`, paragraph, at);
        }
      });

      const oldWords = new Set(tokenize(oldText));
      tokenize(newText).forEach((word) => {
        if (!oldWords.has(word)) recordEvent(note, "word", word, word, at);
      });
    }

    function splitParagraphs(text) {
      return String(text || "")
        .split(/\\n\\s*\\n|\\n/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function tokenize(text) {
      const matches = String(text || "").match(/[\\p{Script=Han}\\p{Script=Hiragana}\\p{Script=Katakana}ー]+|[A-Za-z0-9_]+/gu);
      return matches ? matches.map(w => w.toLowerCase()) : [];
    }

    function findNote(id) {
      return state.notes.find(note => note.id === id);
    }

    function childNotes(parentId) {
      return state.notes
        .filter(note => note.parentId === parentId)
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    }

    function descendantIds(parentId) {
      const ids = [];
      const walk = (id) => {
        childNotes(id).forEach(child => {
          ids.push(child.id);
          walk(child.id);
        });
      };
      walk(parentId);
      return ids;
    }

    function noteMatchesQuery(note, query) {
      if (!query) return true;
      if (`${note.title} ${note.text} ${note.tags.join(" ")}`.toLowerCase().includes(query)) return true;
      return childNotes(note.id).some(child => noteMatchesQuery(child, query));
    }

    function parseTags(value) {
      return String(value || "")
        .split(/[,\s、，]+/)
        .map(tag => tag.trim())
        .filter(Boolean)
        .slice(0, 8);
    }

    function firstTag(note) {
      return (note.tags?.[0] || "").toLowerCase();
    }

    function uniqueTags(notes = state.notes, extra = []) {
      return [...new Set([...extra, ...notes.flatMap(note => note.tags || [])].filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function renderTagShelf() {
      const tags = uniqueTags(state.notes, state.tags);
      return `
        <div class="tag-shelf" data-tag-shelf="true">
          <input class="tag-create" id="tagCreateInput" placeholder="タグ追加">
          <button class="icon" id="tagCreateBtn" title="タグ追加">${iconPlus()}</button>
          ${tags.map(tag => renderTagSticker(tag)).join("")}
        </div>
      `;
    }

    function renderTagSticker(tag, noteId = "") {
      const source = noteId ? `data-source-note="${noteId}"` : "";
      return `<button class="tag-sticker${noteId ? " attached" : ""}" draggable="true" data-tag="${escapeAttr(tag)}" ${source}>${escapeHtml(tag)}</button>`;
    }

    function renderTag3DControls() {
      const active = (view) => view === tag3dView ? " active" : "";
      return `
        <div class="tag-3d-controls">
          <select class="depth-mode" id="inlineDepthMode" title="奥行きモード">
            <option value="even"${el.depthModeSelect.value === "even" ? " selected" : ""}>奥行き均等</option>
            <option value="time"${el.depthModeSelect.value === "time" ? " selected" : ""}>時系列</option>
          </select>
          <div class="view-cube" aria-label="ビューキューブ">
            <span></span><button data-view="top" class="${active("top")}">上</button><span></span>
            <button data-view="left" class="${active("left")}">左</button><button data-view="front" class="${active("front")}">前</button><button data-view="right" class="${active("right")}">右</button>
            <span></span><button data-view="bottom" class="${active("bottom")}">下</button><span></span>
          </div>
        </div>
      `;
    }

    function wireTag3DControls() {
      const inlineMode = document.getElementById("inlineDepthMode");
      if (inlineMode) {
        inlineMode.addEventListener("change", () => {
          el.depthModeSelect.value = inlineMode.value;
          arrangeNotes("tag");
        });
      }
      el.canvas.querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => {
          tag3dView = button.dataset.view;
          renderNotes();
        });
      });
    }

    function renderTags(note) {
      return note.tags.length ? note.tags.map(tag => renderTagSticker(tag, note.id)).join("") : "";
    }

    function updateTags(note, value) {
      const nextTags = parseTags(value);
      if (nextTags.join("\n") === note.tags.join("\n")) return;
      note.tags = nextTags;
      note.updatedAt = now();
      recordEvent(note, "full", "タグ更新", note.tags.join(", "));
      persist();
      render();
    }

    function addGlobalTag(tag) {
      const value = tag.trim();
      if (!value) return;
      state.tags = uniqueTags(state.notes, [...state.tags, value]);
      persist();
      render();
      toast("タグを追加しました");
    }

    function addTagToNote(note, tag) {
      if (!note || !tag || note.tags.includes(tag)) return;
      note.tags.push(tag);
      state.tags = uniqueTags(state.notes, [...state.tags, tag]);
      note.updatedAt = now();
      recordEvent(note, "full", "タグ貼り付け", tag);
      persist();
      render();
    }

    function removeTagFromNote(note, tag) {
      if (!note || !tag || !note.tags.includes(tag)) return;
      note.tags = note.tags.filter(item => item !== tag);
      note.updatedAt = now();
      recordEvent(note, "full", "タグ取り外し", tag);
      persist();
      render();
    }

    function arrangeNotes(mode, showToast = true) {
      const sorted = state.notes
        .filter(note => !note.parentId)
        .sort((a, b) => {
          if (mode === "color") return a.color.localeCompare(b.color) || a.title.localeCompare(b.title, "ja");
          if (mode === "tag") return firstTag(a).localeCompare(firstTag(b), "ja") || new Date(b.updatedAt) - new Date(a.updatedAt);
          if (mode === "updated") return new Date(b.updatedAt) - new Date(a.updatedAt);
          return 0;
        });

      if (mode === "tag") {
        arrangeTag3D(sorted);
      } else {
        arrangeFlat(sorted);
      }
      persist();
      render();
      if (showToast) toast("メモを整列しました");
    }

    function arrangeFlat(sorted) {
      const startX = 80;
      const startY = 110;
      const maxColumns = 4;
      const columnWidth = Math.max(330, ...sorted.map(note => (note.w || 260) + 56));
      const rowHeight = Math.max(230, ...sorted.map(note => (note.h || 188) + 58));
      sorted.forEach((note, index) => {
        note.x = startX + (index % maxColumns) * columnWidth;
        note.y = startY + Math.floor(index / maxColumns) * rowHeight;
      });
    }

    function arrangeTag3D(sorted) {
      const groups = new Map();
      sorted.forEach(note => {
        const tag = firstTag(note) || "タグなし";
        if (!groups.has(tag)) groups.set(tag, []);
        groups.get(tag).push(note);
      });
      const allTimes = sorted.map(note => new Date(note.updatedAt).getTime());
      const maxTime = Math.max(...allTimes, Date.now());
      const minTime = Math.min(...allTimes, maxTime);
      const timeRange = Math.max(1, maxTime - minTime);
      const depthMode = el.depthModeSelect.value || "even";
      let groupIndex = 0;
      for (const notes of groups.values()) {
        notes.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
        notes.forEach((note, stackIndex) => {
          note.x = 110 + groupIndex * 300 + stackIndex * 10;
          note.y = 130 + stackIndex * 12;
          note.w = 220;
          note.h = 168;
          const depth = depthMode === "time"
            ? Math.round(((new Date(note.updatedAt).getTime() - minTime) / timeRange) * 320)
            : (notes.length - 1 - stackIndex) * 70;
          note.depth = depth;
        });
        groupIndex += 1;
      }
    }

    function render() {
      renderNotes();
      renderSidePanel();
    }

    function renderNotes() {
      const query = el.searchInput.value.trim().toLowerCase();
      const isTag3D = el.arrangeSelect.value === "tag";
      const notes = [...state.notes]
        .filter(note => !note.parentId)
        .sort((a, b) => {
          if (isTag3D) return firstTag(a).localeCompare(firstTag(b), "ja") || new Date(b.updatedAt) - new Date(a.updatedAt);
          return Number(b.pinned) - Number(a.pinned) || new Date(b.updatedAt) - new Date(a.updatedAt);
        })
        .filter(note => noteMatchesQuery(note, query));

      el.canvas.className = `canvas${isTag3D ? ` tag-3d view-${tag3dView}` : ""}`;
      el.depthModeSelect.hidden = !isTag3D;
      el.canvas.innerHTML = renderTagShelf() + (isTag3D ? renderTag3DControls() + `<canvas class="tag3d-webgl" id="tag3dCanvas"></canvas>` : "");
      wireTagShelf();
      if (isTag3D) wireTag3DControls();
      notes.forEach(note => {
        const children = childNotes(note.id);
        const card = document.createElement("article");
        card.className = `note${note.id === selectedId ? " selected" : ""}${note.pinned ? " pinned" : ""}${note.collapsed ? " collapsed" : ""}`;
        card.style.left = `${note.x}px`;
        card.style.top = `${note.y}px`;
        card.style.width = `${note.w || 260}px`;
        card.style.height = `${note.h || 188}px`;
        card.style.background = note.color;
        card.style.setProperty("--z", `${note.depth || 0}px`);
        card.dataset.id = note.id;
        card.innerHTML = `
          <div class="note-head">
            <input class="note-title" value="${escapeAttr(note.title)}" aria-label="タイトル">
          </div>
          <div class="note-meta">${formatDate(note.createdAt)} 作成 / ${formatDate(note.updatedAt)} 更新</div>
          <textarea aria-label="本文" placeholder="メモを書く">${escapeHtml(note.text)}</textarea>
          <div class="note-body">
            <div class="tag-row">${renderTags(note)}</div>
            <div class="note-images">${note.images.map(src => `<img src="${src}" alt="貼り込んだ画像">`).join("")}</div>
            <div class="child-notes" style="--child-area-height:${childAreaHeight(children)}px">${children.map(child => renderChildNote(child)).join("")}</div>
            <div class="note-actions">
              <span>
                <button class="pin" title="ピン留め">${iconPin()}</button>
                <button class="image" title="画像を追加">${iconImage()}</button>
                <button class="add-child" title="子メモを追加">${iconNested()}</button>
                <button class="history" title="このメモの履歴">${iconHistory()}</button>
              </span>
              <button class="delete" title="削除">${iconTrash()}</button>
            </div>
          </div>
        `;

        card.addEventListener("pointerdown", (event) => {
          selectedId = note.id;
          persist();
          renderSidePanel();
          document.querySelectorAll(".note").forEach(n => n.classList.toggle("selected", n.dataset.id === selectedId));
        });

        const head = card.querySelector(".note-head");
        head.addEventListener("pointerdown", (event) => startDrag(event, note, card));
        card.addEventListener("dblclick", (event) => {
          if (event.target.closest("button,textarea")) return;
          toggleCollapsed(note);
        });
        wireNoteTagDrop(card, note);

        const title = card.querySelector(".note-title");
        title.addEventListener("change", () => {
          note.title = title.value.trim() || "無題のメモ";
          note.updatedAt = now();
          recordEvent(note, "full", "タイトル更新", note.title);
          persist();
          render();
        });

        const textarea = card.querySelector("textarea");
        textarea.addEventListener("input", () => {
          textarea.style.height = "auto";
          textarea.style.height = `${textarea.scrollHeight}px`;
        });
        textarea.addEventListener("change", () => {
          const at = now();
          const oldText = note.lastText || "";
          note.text = textarea.value;
          recordTextHistory(note, oldText, note.text, at);
          note.lastText = note.text;
          note.updatedAt = at;
          persist();
          render();
        });

        card.querySelector(".pin").addEventListener("click", (event) => {
          event.stopPropagation();
          note.pinned = !note.pinned;
          note.updatedAt = now();
          recordEvent(note, "full", note.pinned ? "ピン留め" : "ピン解除", note.title);
          persist();
          render();
        });

        card.querySelector(".image").addEventListener("click", (event) => {
          event.stopPropagation();
          imageTargetId = note.id;
          el.imageInput.click();
        });

        card.querySelector(".add-child").addEventListener("click", (event) => {
          event.stopPropagation();
          createChildNote(note);
        });

        card.querySelector(".history").addEventListener("click", (event) => {
          event.stopPropagation();
          selectedId = note.id;
          historyMode = "selected";
          el.tabSelected.classList.add("active");
          el.tabAll.classList.remove("active");
          el.tabTree.classList.remove("active");
          persist();
          render();
        });

        card.querySelector(".delete").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNoteTree(note.id);
          persist();
          render();
          toast("メモを削除しました");
        });

        wireChildNotes(card);

        card.addEventListener("mouseup", () => {
          const rect = card.getBoundingClientRect();
          const canvasRect = el.canvas.getBoundingClientRect();
          note.w = Math.round(rect.width);
          note.h = Math.round(rect.height);
          note.x = Math.round(rect.left - canvasRect.left + el.canvas.scrollLeft);
          note.y = Math.round(rect.top - canvasRect.top + el.canvas.scrollTop);
          persist();
        });

        el.canvas.appendChild(card);
      });
      wireTagStickers(el.canvas);
      if (isTag3D) {
        renderTag3DScene(notes);
      } else if (tag3dRuntime) {
        tag3dRuntime = null;
      }
    }

    function renderChildNote(child) {
      const grandchildren = childNotes(child.id);
      return `
        <section class="child-note${child.id === selectedId ? " selected" : ""}${child.collapsed ? " collapsed" : ""}" data-child-id="${child.id}" style="left:${child.localX || 8}px; top:${child.localY || 8}px; background:${child.color}">
          <div class="child-head">
            <button class="child-move" title="親メモ内で移動">${iconMove()}</button>
            <input class="child-title" value="${escapeAttr(child.title)}" aria-label="子メモタイトル">
          </div>
          <textarea class="child-text" aria-label="子メモ本文" placeholder="子メモを書く">${escapeHtml(child.text)}</textarea>
          <div class="tag-row child-tags">${renderTags(child)}</div>
          <div class="child-meta">${formatDate(child.createdAt)} 作成 / 画像 ${child.images.length} 件 / 子 ${grandchildren.length} 件</div>
          <div class="child-actions">
            <span>
              <button class="child-select" title="選択">${iconSelect()}</button>
              <button class="child-image" title="画像を追加">${iconImage()}</button>
              <button class="child-add" title="さらに子メモを追加">${iconNested()}</button>
            </span>
            <button class="child-delete" title="削除">${iconTrash()}</button>
          </div>
          <div class="child-notes" style="--child-area-height:${childAreaHeight(grandchildren)}px">${grandchildren.map(grandchild => renderChildNote(grandchild)).join("")}</div>
        </section>
      `;
    }

    function wireChildNotes(scope) {
      scope.querySelectorAll(".child-note").forEach(childCard => {
        const child = findNote(childCard.dataset.childId);
        if (!child) return;

        childCard.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
          selectedId = child.id;
          persist();
          renderSidePanel();
          document.querySelectorAll(".child-note").forEach(item => item.classList.toggle("selected", item.dataset.childId === selectedId));
        });

        childCard.addEventListener("dblclick", (event) => {
          if (event.target.closest("button,textarea")) return;
          event.stopPropagation();
          toggleCollapsed(child);
        });
        wireNoteTagDrop(childCard, child);

        childCard.querySelector(".child-head").addEventListener("pointerdown", (event) => {
          if (event.target.closest("input")) return;
          startChildDrag(event, child, childCard);
        });
        childCard.querySelector(".child-head").addEventListener("mousedown", (event) => {
          if (event.target.closest("input")) return;
          startChildMouseDrag(event, child, childCard);
        });

        childCard.querySelector(".child-title").addEventListener("change", (event) => {
          child.title = event.target.value.trim() || "子メモ";
          child.updatedAt = now();
          recordEvent(child, "full", "タイトル更新", child.title);
          persist();
          render();
        });

        childCard.querySelector(".child-text").addEventListener("change", (event) => {
          const at = now();
          const oldText = child.lastText || "";
          child.text = event.target.value;
          recordTextHistory(child, oldText, child.text, at);
          child.lastText = child.text;
          child.updatedAt = at;
          persist();
          render();
        });

        childCard.querySelector(".child-select").addEventListener("click", (event) => {
          event.stopPropagation();
          selectedId = child.id;
          historyMode = "selected";
          el.tabSelected.classList.add("active");
          el.tabAll.classList.remove("active");
          el.tabTree.classList.remove("active");
          persist();
          render();
        });

        childCard.querySelector(".child-image").addEventListener("click", (event) => {
          event.stopPropagation();
          imageTargetId = child.id;
          el.imageInput.click();
        });

        childCard.querySelector(".child-add").addEventListener("click", (event) => {
          event.stopPropagation();
          createChildNote(child);
        });

        childCard.querySelector(".child-delete").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNoteTree(child.id);
          persist();
          render();
          toast("子メモを削除しました");
        });
      });
    }

    function deleteNoteTree(noteId) {
      const removeIds = new Set([noteId, ...descendantIds(noteId)]);
      state.notes = state.notes.filter(item => !removeIds.has(item.id));
      if (removeIds.has(selectedId)) {
        selectedId = state.notes[0]?.id || null;
      }
    }

    function wireTagShelf() {
      const input = document.getElementById("tagCreateInput");
      const button = document.getElementById("tagCreateBtn");
      if (!input || !button) return;
      const commit = () => {
        addGlobalTag(input.value);
        input.value = "";
      };
      button.addEventListener("click", commit);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          commit();
        }
      });
      if (el.canvas.dataset.tagDropWired === "true") return;
      el.canvas.dataset.tagDropWired = "true";
      el.canvas.addEventListener("dragover", (event) => event.preventDefault());
      el.canvas.addEventListener("drop", (event) => {
        event.preventDefault();
        if (tagDrag?.sourceNoteId && !event.target.closest(".note,.child-note")) {
          removeTagFromNote(findNote(tagDrag.sourceNoteId), tagDrag.tag);
        }
      });
    }

    function wireTagStickers(scope) {
      scope.querySelectorAll(".tag-sticker").forEach(sticker => {
        sticker.addEventListener("dragstart", (event) => {
          tagDrag = {
            tag: sticker.dataset.tag,
            sourceNoteId: sticker.dataset.sourceNote || "",
            droppedOnNote: false
          };
          sticker.classList.add("dragging");
          event.dataTransfer.effectAllowed = "copyMove";
          event.dataTransfer.setData("text/plain", tagDrag.tag);
        });
        sticker.addEventListener("dragend", (event) => {
          sticker.classList.remove("dragging");
          if (tagDrag?.sourceNoteId && !tagDrag.droppedOnNote) {
            const target = document.elementFromPoint(event.clientX, event.clientY);
            if (!target?.closest(".note,.child-note")) {
              removeTagFromNote(findNote(tagDrag.sourceNoteId), tagDrag.tag);
            }
          }
          tagDrag = null;
        });
      });
    }

    function wireNoteTagDrop(card, note) {
      card.addEventListener("dragover", (event) => {
        if (!tagDrag) return;
        event.preventDefault();
        card.classList.add("drop-target");
      });
      card.addEventListener("dragleave", (event) => {
        if (!card.contains(event.relatedTarget)) card.classList.remove("drop-target");
      });
      card.addEventListener("drop", (event) => {
        if (!tagDrag) return;
        event.preventDefault();
        event.stopPropagation();
        card.classList.remove("drop-target");
        tagDrag.droppedOnNote = true;
        if (tagDrag.sourceNoteId && tagDrag.sourceNoteId !== note.id) {
          removeTagFromNote(findNote(tagDrag.sourceNoteId), tagDrag.tag);
        }
        addTagToNote(note, tagDrag.tag);
      });
    }

    function childAreaHeight(children) {
      if (children.length === 0) return 46;
      const bottom = Math.max(...children.map(child => (child.localY || 8) + childVisualHeight(child)));
      return Math.max(160, bottom + 18);
    }

    function childVisualHeight(child) {
      if (child.collapsed) return 54;
      const nested = childAreaHeight(childNotes(child.id));
      return 138 + Math.min(260, nested);
    }

    function toggleCollapsed(note) {
      note.collapsed = !note.collapsed;
      note.updatedAt = now();
      recordEvent(note, "full", note.collapsed ? "タイトル表示に折りたたみ" : "メモを展開", note.title);
      persist();
      render();
    }

    function startChildDrag(event, child, childCard) {
      event.preventDefault();
      event.stopPropagation();
      childCard.setPointerCapture(event.pointerId);
      childCard.classList.add("dragging");
      drag = {
        type: "child",
        id: child.id,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        noteX: child.localX || 8,
        noteY: child.localY || 8,
        moved: false
      };
      window.addEventListener("pointermove", onChildDrag);
      window.addEventListener("pointerup", endChildDrag, { once: true });
    }

    function startChildMouseDrag(event, child, childCard) {
      event.preventDefault();
      event.stopPropagation();
      childCard.classList.add("dragging");
      drag = {
        type: "child-mouse",
        id: child.id,
        startX: event.clientX,
        startY: event.clientY,
        noteX: child.localX || 8,
        noteY: child.localY || 8,
        moved: false
      };
      window.addEventListener("mousemove", onChildMouseDrag);
      window.addEventListener("mouseup", endChildMouseDrag, { once: true });
    }

    function onChildDrag(event) {
      if (!drag || drag.type !== "child" || event.pointerId !== drag.pointerId) return;
      moveChildByClientPosition(event.clientX, event.clientY);
    }

    function onChildMouseDrag(event) {
      if (!drag || drag.type !== "child-mouse") return;
      moveChildByClientPosition(event.clientX, event.clientY);
    }

    function moveChildByClientPosition(clientX, clientY) {
      const child = findNote(drag.id);
      if (!child) return;
      const childCard = document.querySelector(`.child-note[data-child-id="${child.id}"]`);
      if (!childCard) return;
      const container = childCard.parentElement;
      const maxX = Math.max(0, container.clientWidth - childCard.offsetWidth - 8);
      child.localX = Math.max(0, Math.min(maxX, drag.noteX + clientX - drag.startX));
      child.localY = Math.max(0, drag.noteY + clientY - drag.startY);
      drag.moved = true;
      childCard.style.left = `${child.localX}px`;
      childCard.style.top = `${child.localY}px`;
    }

    function endChildDrag(event) {
      const card = drag ? document.querySelector(`.child-note[data-child-id="${drag.id}"]`) : null;
      if (card) card.classList.remove("dragging");
      window.removeEventListener("pointermove", onChildDrag);
      if (drag?.moved) {
        const child = findNote(drag.id);
        if (child) {
          child.updatedAt = now();
          const parent = findNote(child.parentId);
          if (parent) parent.updatedAt = child.updatedAt;
          persist();
          render();
        }
      }
      drag = null;
    }

    function endChildMouseDrag() {
      const card = drag ? document.querySelector(`.child-note[data-child-id="${drag.id}"]`) : null;
      if (card) card.classList.remove("dragging");
      window.removeEventListener("mousemove", onChildMouseDrag);
      if (drag?.moved) {
        const child = findNote(drag.id);
        if (child) {
          child.updatedAt = now();
          const parent = findNote(child.parentId);
          if (parent) parent.updatedAt = child.updatedAt;
          persist();
          render();
        }
      }
      drag = null;
    }

    function startDrag(event, note, card) {
      if (event.target.closest("input,button,textarea")) return;
      event.preventDefault();
      card.setPointerCapture(event.pointerId);
      drag = {
        id: note.id,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        noteX: note.x,
        noteY: note.y,
        moved: false
      };
      card.addEventListener("pointermove", onDrag);
      card.addEventListener("pointerup", endDrag, { once: true });
    }

    function onDrag(event) {
      if (!drag || event.pointerId !== drag.pointerId) return;
      const note = findNote(drag.id);
      if (!note) return;
      note.x = Math.max(0, drag.noteX + event.clientX - drag.startX);
      note.y = Math.max(0, drag.noteY + event.clientY - drag.startY);
      drag.moved = true;
      const card = document.querySelector(`.note[data-id="${note.id}"]`);
      if (card) {
        card.style.left = `${note.x}px`;
        card.style.top = `${note.y}px`;
      }
    }

    function endDrag(event) {
      const card = event.currentTarget;
      card.removeEventListener("pointermove", onDrag);
      if (drag?.moved) {
        const note = findNote(drag.id);
        if (note) {
          note.updatedAt = now();
          persist();
        }
      }
      drag = null;
    }

    function renderSidePanel() {
      if (historyMode === "tree") {
        renderTreeList();
        return;
      }
      renderHistory();
    }

    function renderHistory() {
      const selected = findNote(selectedId);
      const events = getVisibleEvents();
      el.sideTitle.textContent = historyMode === "all" ? "全メモの履歴" : selected ? `${selected.title} の履歴` : "履歴";
      el.sideSummary.textContent = historyMode === "all"
        ? "すべてのメモの作成、本文全体、段落、言葉単位の更新を時系列で表示します。"
        : "選択中メモの粒度別履歴を時系列で表示します。";

      if (events.length === 0) {
        el.historyList.innerHTML = `<div class="empty">履歴はまだありません。</div>`;
        return;
      }

      el.historyList.innerHTML = events.map(event => `
        <div class="event">
          <div class="event-top">
            <span class="pill ${event.type}">${typeLabel[event.type] || event.type}</span>
            <span>${formatDateTime(event.at)}</span>
          </div>
          <div class="event-note">${escapeHtml(event.noteTitle || findNote(event.noteId)?.title || "メモ")}</div>
          <div class="event-body">${escapeHtml(event.label)}${event.value ? "\\n" + escapeHtml(event.value) : ""}</div>
        </div>
      `).join("");
    }

    function getVisibleEvents() {
      if (historyMode !== "all" && !selectedId) return [];
      const source = historyMode === "all"
        ? state.notes
        : state.notes.filter(note => note.id === selectedId || descendantIds(selectedId).includes(note.id));
      return source.flatMap(note => note.history.map(event => ({ ...event, noteTitle: note.title })))
        .sort((a, b) => new Date(b.at) - new Date(a.at));
    }

    function renderTreeList() {
      const roots = state.notes
        .filter(note => !note.parentId)
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

      el.sideTitle.textContent = "メモツリー";
      el.sideSummary.textContent = "包含関係をテキストだけで表示します。画像はリンクとして並び、押すとポップアップで開きます。";

      if (roots.length === 0) {
        el.historyList.innerHTML = `<div class="empty">ツリー化できるメモはまだありません。</div>`;
        return;
      }

      el.historyList.innerHTML = `<div class="tree-list">${roots.map(note => renderTreeItem(note, 0)).join("")}</div>`;
    }

    function renderTreeItem(note, depth) {
      const children = childNotes(note.id);
      const images = note.images.map((_, index) => `
        <button class="tree-image-link" data-image-note="${note.id}" data-image-index="${index}">画像${index + 1}</button>
      `).join("");

      return `
        <div class="tree-item" style="margin-left:${depth * 16}px">
          <button class="tree-title tree-note-link" data-tree-note="${note.id}">${escapeHtml(note.title)}</button>
          <div class="tree-text">${escapeHtml(note.text || "本文なし")}</div>
          ${images ? `<div class="tree-images">${images}</div>` : ""}
        </div>
        ${children.map(child => renderTreeItem(child, depth + 1)).join("")}
      `;
    }

    function openImageModal(src, noteTitle, imageNumber) {
      el.imageModalTitle.textContent = `${noteTitle} / 画像${imageNumber}`;
      el.imageModalImg.src = src;
      el.imageModal.classList.add("open");
    }

    function closeImageModal() {
      el.imageModal.classList.remove("open");
      el.imageModalImg.removeAttribute("src");
    }

    async function renderTag3DScene(notes) {
      const canvas = document.getElementById("tag3dCanvas");
      if (!canvas) return;
      try {
        const THREE = await import("/vendor/three/three.module.js");
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(el.canvas.clientWidth, el.canvas.clientHeight, false);
        renderer.setClearColor(0x111827, 1);

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x111827, 1000, 2400);
        const camera = new THREE.PerspectiveCamera(48, el.canvas.clientWidth / el.canvas.clientHeight, 1, 5000);
        setTag3DCamera(camera);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x334155, 2.2));
        const light = new THREE.DirectionalLight(0xffffff, 1.7);
        light.position.set(260, 520, 420);
        scene.add(light);

        const grid = new THREE.GridHelper(1450, 24, 0x94a3b8, 0x334155);
        grid.position.set(420, -190, 120);
        scene.add(grid);

        const sorted = [...notes].sort((a, b) => firstTag(a).localeCompare(firstTag(b), "ja") || new Date(b.updatedAt) - new Date(a.updatedAt));
        const tagColumns = new Map();
        sorted.forEach(note => {
          const tag = firstTag(note) || "タグなし";
          if (!tagColumns.has(tag)) tagColumns.set(tag, tagColumns.size);
          const tagIndex = tagColumns.get(tag);
          const x = -520 + tagIndex * 310;
          const z = note.depth || 0;
          const y = 190 - z * 0.24;
          const card = makeNote3DCard(THREE, note);
          card.position.set(x + z * 0.2, y, z);
          scene.add(card);
        });

        for (const [tag, index] of tagColumns.entries()) {
          const label = makeLabel(THREE, tag, "タグ列", "");
          label.position.set(-520 + index * 310, 270, -40);
          scene.add(label);
        }

        renderer.render(scene, camera);
        tag3dRuntime = { THREE, renderer, scene, camera };
      } catch (error) {
        console.error(error);
        toast("タグ3Dシーンの描画に失敗しました");
      }
    }

    function setTag3DCamera(camera) {
      const positions = {
        front: [120, 300, 1050],
        top: [120, 1120, 80],
        bottom: [120, -760, 720],
        left: [-1080, 260, 360],
        right: [1180, 260, 360]
      };
      const [x, y, z] = positions[tag3dView] || positions.front;
      camera.position.set(x, y, z);
      camera.lookAt(140, 70, 120);
    }

    function makeNote3DCard(THREE, note) {
      const group = new THREE.Group();
      const geometry = new THREE.BoxGeometry(220, 156, 18);
      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color(note.color || "#fff8c7"),
        roughness: .62,
        metalness: .03
      });
      const mesh = new THREE.Mesh(geometry, material);
      group.add(mesh);

      const label = makeCardTextureLabel(THREE, note);
      label.position.set(0, 0, 10);
      group.add(label);

      return group;
    }

    function makeCardTextureLabel(THREE, note) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 360;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(255,255,255,.0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#202124";
      ctx.font = "bold 34px system-ui, sans-serif";
      ctx.fillText(note.title.slice(0, 18), 30, 56);
      ctx.fillStyle = "#5f6368";
      ctx.font = "22px system-ui, sans-serif";
      wrapCanvasText(ctx, note.text || "", 30, 102, 450, 30, 4);
      ctx.fillStyle = "#174ea6";
      ctx.font = "bold 20px system-ui, sans-serif";
      ctx.fillText((note.tags || []).slice(0, 3).join("  "), 30, 318);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(210, 148, 1);
      return sprite;
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text).replace(/\n/g, " ").split(/\s+/).filter(Boolean);
      let line = "";
      let lines = 0;
      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          lines += 1;
          line = word;
          if (lines >= maxLines) return;
        } else {
          line = testLine;
        }
      }
      if (line && lines < maxLines) ctx.fillText(line, x, y);
    }

    async function openTimeline() {
      el.timelineOverlay.classList.add("open");
      await initTimeline();
      renderTimelineScene();
      resizeTimeline();
      toast("3D年表を開きました");
    }

    function closeTimeline() {
      el.timelineOverlay.classList.remove("open");
    }

    async function initTimeline() {
      if (threeRuntime) return;
      try {
        const THREE = await import("/vendor/three/three.module.js");
        const { OrbitControls } = await import("/vendor/three/examples/jsm/controls/OrbitControls.js");
        const renderer = new THREE.WebGLRenderer({ canvas: el.timeline3d, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x111827, 1);
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x111827, 580, 1420);
        const camera = new THREE.PerspectiveCamera(50, 1, 1, 3000);
        camera.position.set(0, 360, 620);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x334155, 2.2));
        const light = new THREE.DirectionalLight(0xffffff, 1.8);
        light.position.set(260, 420, 280);
        scene.add(light);
        threeRuntime = { THREE, renderer, scene, camera, controls, objects: [] };
        window.addEventListener("resize", resizeTimeline);
        animateTimeline();
      } catch (error) {
        console.error(error);
        toast("3D年表の読み込みに失敗しました");
      }
    }

    function resizeTimeline() {
      if (!threeRuntime) return;
      const rect = el.timeline3d.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      threeRuntime.camera.aspect = rect.width / rect.height;
      threeRuntime.camera.updateProjectionMatrix();
      threeRuntime.renderer.setSize(rect.width, rect.height, false);
    }

    function animateTimeline() {
      if (!threeRuntime) return;
      requestAnimationFrame(animateTimeline);
      threeRuntime.controls.update();
      threeRuntime.objects.forEach((obj, i) => {
        obj.rotation.y += 0.002 + (i % 4) * 0.0004;
      });
      threeRuntime.renderer.render(threeRuntime.scene, threeRuntime.camera);
    }

    function renderTimelineScene() {
      if (!threeRuntime) return;
      const { THREE, scene } = threeRuntime;
      threeRuntime.objects.forEach(obj => scene.remove(obj));
      threeRuntime.objects = [];

      const scope = el.timelineScope.value;
      const events = state.notes.flatMap((note, noteIndex) => note.history.map(event => ({
        ...event,
        noteTitle: note.title,
        noteIndex
      }))).filter(event => {
        if (scope === "all") return true;
        if (scope === "note") return event.type === "create" || event.type === "full";
        return event.type === scope;
      }).sort((a, b) => new Date(a.at) - new Date(b.at));

      const times = events.map(event => new Date(event.at).getTime());
      const min = Math.min(...times, Date.now());
      const max = Math.max(...times, min + 1);
      const range = Math.max(1, max - min);

      addGrid(THREE, scene, threeRuntime.objects);
      addAxisLabels(THREE, scene, threeRuntime.objects, min, max);

      events.forEach((event, index) => {
        const x = ((new Date(event.at).getTime() - min) / range - 0.5) * 760;
        const y = 120 - event.noteIndex * 58;
        const z = typeDepth[event.type] ?? 0;
        const radius = event.type === "word" ? 8 : event.type === "paragraph" ? 13 : 18;
        const geometry = event.type === "word"
          ? new THREE.SphereGeometry(radius, 24, 16)
          : new THREE.BoxGeometry(radius * 1.8, radius * 1.8, radius * 1.8);
        const material = new THREE.MeshStandardMaterial({
          color: typeColor[event.type] || 0xffffff,
          roughness: .42,
          metalness: .08,
          emissive: typeColor[event.type] || 0xffffff,
          emissiveIntensity: .08
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        threeRuntime.objects.push(mesh);

        const label = makeLabel(THREE, `${typeLabel[event.type]}: ${event.label}`.slice(0, 34), event.noteTitle, formatDateTime(event.at));
        label.position.set(x, y + 30, z);
        scene.add(label);
        threeRuntime.objects.push(label);

        if (index > 0) {
          const prev = events[index - 1];
          const px = ((new Date(prev.at).getTime() - min) / range - 0.5) * 760;
          const py = 120 - prev.noteIndex * 58;
          const pz = typeDepth[prev.type] ?? 0;
          const lineGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(px, py, pz),
            new THREE.Vector3(x, y, z)
          ]);
          const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: .18 }));
          scene.add(line);
          threeRuntime.objects.push(line);
        }
      });
    }

    function addGrid(THREE, scene, objects) {
      const grid = new THREE.GridHelper(860, 20, 0x94a3b8, 0x334155);
      grid.position.y = -170;
      grid.rotation.x = Math.PI / 2;
      scene.add(grid);
      objects.push(grid);

      const axisMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: .45 });
      const axis = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-430, -170, 0),
        new THREE.Vector3(430, -170, 0)
      ]);
