      const line = new THREE.Line(axis, axisMat);
      scene.add(line);
      objects.push(line);

      Object.entries(typeDepth).forEach(([type, z]) => {
        const lane = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-430, -170, z),
          new THREE.Vector3(430, -170, z)
        ]);
        const laneLine = new THREE.Line(lane, new THREE.LineBasicMaterial({ color: typeColor[type], transparent: true, opacity: .5 }));
        scene.add(laneLine);
        objects.push(laneLine);
        const label = makeLabel(THREE, typeLabel[type], "", "");
        label.position.set(-455, -150, z);
        scene.add(label);
        objects.push(label);
      });
    }

    function addAxisLabels(THREE, scene, objects, min, max) {
      const start = makeLabel(THREE, "開始", "", formatDateTime(new Date(min).toISOString()));
      start.position.set(-410, -130, -145);
      const end = makeLabel(THREE, "最新", "", formatDateTime(new Date(max).toISOString()));
      end.position.set(360, -130, -145);
      scene.add(start, end);
      objects.push(start, end);
    }

    function makeLabel(THREE, line1, line2, line3) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 160;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(255,255,255,.88)";
      roundRect(ctx, 8, 8, 496, 144, 18);
      ctx.fill();
      ctx.fillStyle = "#111827";
      ctx.font = "bold 28px system-ui, sans-serif";
      ctx.fillText(line1 || "", 24, 50);
      ctx.fillStyle = "#374151";
      ctx.font = "22px system-ui, sans-serif";
      if (line2) ctx.fillText(line2.slice(0, 32), 24, 88);
      ctx.fillStyle = "#6b7280";
      ctx.font = "18px system-ui, sans-serif";
      if (line3) ctx.fillText(line3, 24, 122);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(112, 35, 1);
      return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('"', "&quot;");
    }

    function formatDate(iso) {
      return new Intl.DateTimeFormat("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(new Date(iso));
    }

    function formatDateTime(iso) {
      return new Intl.DateTimeFormat("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" }).format(new Date(iso));
    }

    function toast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.toast.classList.remove("show"), 1800);
    }

    function iconPin() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m14 4 6 6-4 1-4 9-2-2 4-9-1-1-9 4-2-2 9-4 1-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    }
    function iconImage() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 5h16v14H4z" stroke="currentColor" stroke-width="1.8"/><path d="m7 16 4-4 3 3 2-2 3 3M8.5 9.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconHistory() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12a8 8 0 1 0 2.4-5.7M4 5v5h5M12 8v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconNested() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 6h6v6H5zM13 12h6v6h-6zM11 9h3a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    }
    function iconSelect() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 4 4L19 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconMove() {
      return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v18M3 12h18M12 3 8 7M12 3l4 4M12 21l-4-4M12 21l4-4M3 12l4-4M3 12l4 4M21 12l-4-4M21 12l-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconPlus() {
      return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    }
    function iconTrash() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
  </script>
