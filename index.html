<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>memo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --paper: #fff8c7;
      --panel: #ffffff;
      --bg: #f6f7f2;
      --accent: #1a73e8;
      --accent-2: #0b8043;
      --warn: #fbbc04;
      --rose: #d93025;
      --shadow: 0 12px 28px rgba(60, 64, 67, .16);
      font-family: "Avenir Next", "IBM Plex Sans JP", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(255,255,255,.68), rgba(255,255,255,.68)),
        radial-gradient(circle at 30px 30px, rgba(32,33,36,.07) 1px, transparent 1.5px);
      background-size: auto, 22px 22px;
      color: var(--ink);
      overflow: hidden;
      font-size: 13px;
      font-family: "Avenir Next", "IBM Plex Sans JP", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      height: 38px;
      border-radius: 19px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      white-space: nowrap;
      font-size: 13px;
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(60,64,67,.16); }
    button:active { transform: translateY(0); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.icon { width: 38px; padding: 0; justify-content: center; }
    button.active { border-color: var(--accent); background: #e8f0fe; color: #174ea6; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .app.side-collapsed .main {
      grid-template-columns: 1fr 0;
    }

    .app.side-collapsed .side {
      transform: translateX(100%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 210px;
      font-weight: 720;
      font-size: 16px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #fdd663, #34a853);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .search {
      flex: 1;
      max-width: 620px;
      position: relative;
    }

    .search input {
      width: 100%;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 20px;
      background: #f1f3f4;
      padding: 0 16px 0 42px;
      outline: none;
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 10px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .sort-control {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 360px;
    }

    .board-shell {
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .board {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 28px;
      cursor: grab;
    }

    .board.panning {
      cursor: grabbing;
    }

    .canvas {
      position: relative;
      width: 2100px;
      height: 1280px;
      background:
        linear-gradient(90deg, rgba(218,220,224,.55) 1px, transparent 1px),
        linear-gradient(rgba(218,220,224,.55) 1px, transparent 1px);
      background-size: 44px 44px;
      border: 1px solid rgba(218,220,224,.8);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }

    .canvas.tag-3d {
      perspective: 1100px;
      transform-style: preserve-3d;
      overflow: visible;
      background: #fff;
    }

    .canvas.tag-3d .note {
      display: none;
    }

    .tag3d-webgl {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
      background: #ffffff;
      border-radius: 8px;
    }

    .markdown-preview {
      width: 100%;
      min-height: 56px;
      max-height: none;
      color: var(--ink);
      line-height: 1.22;
      font-size: var(--note-font-size, 12px);
      font-family: var(--note-font-family, system-ui, sans-serif);
      outline: none;
      overflow: auto;
      border: 1px solid transparent;
      border-radius: 6px;
      resize: both;
    }

    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3 {
      margin: 4px 0 3px;
      line-height: 1.1;
    }

    .markdown-preview h1 { font-size: 16px; }
    .markdown-preview h2 { font-size: 14px; }
    .markdown-preview h3 { font-size: 13px; }
    .markdown-preview p { margin: 2px 0 4px; }
    .markdown-preview ul,
    .markdown-preview ol { margin: 3px 0 5px 18px; padding: 0; }
    .markdown-preview code { background: rgba(32,33,36,.08); border-radius: 4px; padding: 1px 4px; }
    .markdown-preview blockquote { margin: 4px 0; padding-left: 8px; border-left: 3px solid rgba(60,64,67,.24); color: var(--muted); }

    .tag-3d-controls {
      position: sticky;
      top: 58px;
      left: 10px;
      z-index: 80;
      pointer-events: auto;
      width: fit-content;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      padding: 10px;
      border: 1px solid rgba(189,193,198,.75);
      border-radius: 10px;
      background: rgba(255,255,255,.86);
      box-shadow: 0 14px 34px rgba(60,64,67,.14);
      backdrop-filter: blur(8px);
    }

    .depth-mode {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 0 9px;
      background: #fff;
      font-size: 12px;
    }

    .view-cube {
      position: relative;
      z-index: 90;
      width: 106px;
      height: 106px;
      border-radius: 10px;
      perspective: 520px;
      background: transparent;
      box-shadow: none;
      transform-style: preserve-3d;
      cursor: grab;
      touch-action: none;
    }

    .view-cube.dragging {
      cursor: grabbing;
    }

    .view-cube-shell button {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 54px;
      height: 54px;
      min-width: 0;
      padding: 0;
      border-radius: 3px;
      justify-content: center;
      font-size: 12px;
      font-weight: 760;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(130,137,143,.95);
      color: #3c4043;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 8px 16px rgba(0,0,0,.12);
      transform-style: preserve-3d;
      backface-visibility: visible;
      pointer-events: auto;
    }

    .view-cube-shell button[data-view="top"] {
      transform: rotateX(90deg) translateZ(27px);
    }

    .view-cube-shell button[data-view="left"] {
      transform: rotateY(-90deg) translateZ(27px);
    }

    .view-cube-shell button[data-view="front"] {
      z-index: 2;
      transform: translateZ(27px);
    }

    .view-cube-shell button[data-view="right"] {
      transform: rotateY(90deg) translateZ(27px);
    }

    .view-cube-shell button[data-view="bottom"] {
      transform: rotateX(-90deg) translateZ(27px);
    }

    .view-cube-shell button[data-view="back"] {
      transform: rotateY(180deg) translateZ(27px);
    }

    .view-cube-shell button.active {
      background: linear-gradient(145deg, #5f9bff, #1a73e8);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(26,115,232,.28);
    }

    .view-cube-shell {
      position: absolute;
      left: 8px;
      top: 8px;
      width: 90px;
      height: 90px;
      transform-style: preserve-3d;
      transform: rotateX(-26deg) rotateY(38deg);
    }

    .tag-shelf {
      position: sticky;
      top: 10px;
      left: 10px;
      z-index: 15;
      width: fit-content;
      max-width: min(920px, calc(100vw - 420px));
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      padding: 8px;
      border: 1px solid rgba(218,220,224,.9);
      border-radius: 22px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 18px rgba(60,64,67,.12);
      backdrop-filter: blur(10px);
    }

    .tag-create {
      width: 116px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 9px;
      outline: none;
      background: #fff;
      font-size: 12px;
    }

    .tag-sticker {
      min-height: 28px;
      height: auto;
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid rgba(60,64,67,.16);
      background: #fef7e0;
      color: #5f4700;
      box-shadow: 0 2px 6px rgba(60,64,67,.12);
      font-size: 12px;
      font-weight: 740;
      cursor: grab;
      max-width: 170px;
      overflow-wrap: anywhere;
    }

    .tag-sticker.attached {
      min-height: 22px;
      padding: 3px 8px;
      font-size: 11px;
      background: rgba(255,255,255,.74);
      color: var(--ink);
    }

    .tag-sticker.dragging {
      opacity: .55;
    }

    .note.drop-target,
    .child-note.drop-target {
      outline: 3px solid rgba(26,115,232,.32);
      outline-offset: 3px;
    }

    .note.move-source,
    .child-note.move-source {
      outline: 2px dashed var(--accent);
      outline-offset: 6px;
      box-shadow: 0 0 0 6px rgba(26,115,232,.08), var(--shadow);
    }

    .note {
      position: absolute;
      width: 260px;
      min-height: 188px;
      border-radius: 8px;
      padding: 12px;
      background: var(--paper);
      box-shadow: 0 3px 8px rgba(60,64,67,.18);
      border: 2px solid transparent;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
      resize: none;
      overflow: hidden;
      cursor: default;
    }

    .note-resize {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 34px;
      height: 34px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: nwse-resize;
      pointer-events: auto;
      user-select: none;
      z-index: 30;
      touch-action: none;
      transform: none !important;
      box-shadow: none !important;
    }

    .note-resize::before,
    .note-resize::after {
      content: "";
      position: absolute;
      right: 7px;
      bottom: 8px;
      width: 15px;
      border-bottom: 1px solid rgba(60,64,67,.48);
      transform: rotate(-45deg);
      transform-origin: right bottom;
    }

    .note-resize::after {
      right: 7px;
      bottom: 14px;
      width: 10px;
    }

    .note.edge-drag,
    .child-note.edge-drag {
      cursor: grab;
    }

    .note.collapsed {
      min-height: 58px;
      height: 58px !important;
      resize: none;
      grid-template-rows: auto;
    }

    .note.collapsed .note-meta,
    .note.collapsed textarea,
    .note.collapsed .markdown-preview,
    .note.collapsed .note-body {
      display: none;
    }

    .note.selected {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      z-index: 8;
    }

    .note.dragging {
      z-index: 20;
      opacity: .96;
    }

    .note-head {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: grab;
      min-height: 26px;
    }

    .note-title {
      flex: 1;
      min-width: 0;
      border: 0;
      background: transparent;
      font-weight: 760;
      color: var(--ink);
      outline: none;
      font-size: 13px;
    }

    .head-actions {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-left: auto;
    }

    .head-actions button {
      width: 24px;
      height: 24px;
      border-radius: 12px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.66);
    }

    .note-meta {
      color: rgba(32,33,36,.65);
      font-size: 10px;
      line-height: 1.18;
    }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag-input {
      width: 100%;
      min-width: 0;
      height: 28px;
      border: 1px solid rgba(60,64,67,.16);
      border-radius: 14px;
      background: rgba(255,255,255,.56);
      padding: 0 9px;
      outline: none;
      font-size: 12px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 10px;
      padding: 2px 7px;
      background: rgba(32,33,36,.08);
      color: var(--muted);
      font-size: 10px;
      font-weight: 680;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .note textarea,
    .markdown-preview {
      width: 100%;
      min-height: 56px;
      max-width: none;
      max-height: none;
      border: 1px solid transparent;
      border-radius: 6px;
      outline: none;
      resize: both;
      background: transparent;
      color: var(--ink);
      line-height: 1.22;
      font-size: var(--note-font-size, 12px);
      font-family: var(--note-font-family, system-ui, sans-serif);
      overflow-y: auto;
      overflow-x: auto;
      box-sizing: border-box;
    }

    .note textarea:hover,
    .note textarea:focus,
    .markdown-preview:hover,
    .markdown-preview:focus {
      border-color: rgba(60,64,67,.18);
      background: rgba(255,255,255,.16);
    }

    .note-body {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 6px;
      overflow: hidden;
    }

    .note-images {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      max-height: 128px;
      overflow: auto;
    }

    .note-images img {
      width: 100%;
      height: 74px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff;
    }

    .child-notes {
      position: relative;
      margin: 0;
      min-height: 0;
      height: var(--child-area-height, 190px);
      max-height: none;
      overflow: visible;
      border-radius: 8px;
    }

    .child-note {
      position: absolute;
      width: 230px;
      min-height: 150px;
      border: 2px solid transparent;
      border-radius: 7px;
      background: rgba(255,255,255,.58);
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 5px;
      overflow: hidden;
    }

    .child-note.collapsed {
      min-height: 38px;
      height: 38px;
      overflow: hidden;
    }

    .child-note.collapsed .child-text,
    .child-note.collapsed .child-meta,
    .child-note.collapsed .child-actions,
    .child-note.collapsed .child-tags,
    .child-note.collapsed .child-notes {
      display: none;
    }

    .child-note.dragging {
      opacity: .86;
      z-index: 12;
      box-shadow: var(--shadow);
    }

    .child-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 5px;
    }

    .child-note.selected {
      outline: 2px solid var(--accent);
      background: rgba(232,240,254,.86);
    }

    .child-note input,
    .child-note textarea,
    .child-note .markdown-preview {
      width: 100%;
      background: transparent;
      outline: none;
      color: var(--ink);
    }

    .child-note input {
      font-size: 11px;
      font-weight: 760;
    }

    .child-note textarea {
      min-height: 46px;
    }

    .child-note .markdown-preview {
      min-height: 46px;
    }

    .child-meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.12;
    }

    .child-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 28px;
    }

    .note > .note-body > .child-notes {
      height: auto;
      min-height: 0;
    }

    .child-actions button {
      height: 26px;
      width: 26px;
      border-radius: 13px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.75);
    }

    .note-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 28px;
    }

    .note-actions button {
      height: 30px;
      width: 30px;
      border-radius: 15px;
      padding: 0;
      justify-content: center;
      background: rgba(255,255,255,.72);
    }

    .context-menu {
      position: fixed;
      z-index: 100;
      min-width: 180px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      display: grid;
      gap: 3px;
    }

    .context-menu button,
    .context-menu label {
      height: 32px;
      border: 0;
      border-radius: 6px;
      justify-content: flex-start;
      background: transparent;
      padding: 0 9px;
      font-size: 12px;
      color: var(--ink);
    }

    .context-menu button:hover,
    .context-menu label:hover {
      background: rgba(26,115,232,.08);
    }

    .context-menu select {
      width: 100%;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
    }

    .move-arrow {
      position: absolute;
      z-index: 60;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .move-arrow-line {
      position: absolute;
      left: 0;
      top: 0;
      height: 0;
      border-top: 2px dashed var(--accent);
      transform-origin: 0 0;
    }

    .move-arrow-line::after {
      content: "";
      position: absolute;
      right: -2px;
      top: -6px;
      border-left: 9px solid var(--accent);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }

    .side {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      transition: transform .22s ease;
    }

    .side-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .side-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .side-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .side-head p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.22;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px 0;
    }

    .tabs button {
      flex: 1;
      justify-content: center;
      height: 30px;
      border-radius: 17px;
      font-size: 12px;
    }

    .panel {
      min-height: 0;
      overflow: auto;
      padding: 12px 14px 18px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .event {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .event.selected-event {
      border-color: var(--accent);
      background: #f8fbff;
      box-shadow: 0 0 0 3px rgba(26,115,232,.14);
    }

    .event-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 720;
      background: #f1f3f4;
      color: #3c4043;
    }

    .pill.full { background: #e8f0fe; color: #174ea6; }
    .pill.paragraph { background: #e6f4ea; color: #137333; }
    .pill.word { background: #fef7e0; color: #b06000; }
    .pill.create { background: #fce8e6; color: #a50e0e; }

    .event-note {
      font-weight: 720;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .event-body {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.22;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 88px;
      overflow: auto;
    }

    .tree-list {
      display: grid;
      gap: 6px;
      font-size: 11px;
      line-height: 1.22;
    }

    .tree-item {
      border-left: 2px solid var(--line);
      padding: 5px 0 5px 10px;
      background: linear-gradient(90deg, rgba(241,243,244,.72), transparent);
    }

    .tree-title {
      font-weight: 760;
      margin-bottom: 3px;
      word-break: break-word;
    }

    .tree-note-link {
      height: auto;
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
      color: var(--ink);
      justify-content: start;
      text-align: left;
      white-space: normal;
    }

    .tree-note-link:hover {
      transform: none;
      box-shadow: none;
      color: var(--accent);
    }

    .tree-text {
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tree-images {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tree-image-link {
      height: 26px;
      border: 0;
      border-radius: 13px;
      padding: 0 9px;
      background: #e8f0fe;
      color: #174ea6;
      box-shadow: none;
      font-size: 12px;
      text-decoration: underline;
    }

    .timeline {
      position: fixed;
      inset: 58px 0 0 0;
      background: #111827;
      z-index: 40;
      display: none;
      grid-template-rows: 54px 1fr;
      color: #fff;
    }

    .timeline.open { display: grid; }

    .timeline-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.14);
      background: rgba(17,24,39,.92);
    }

    .timeline-bar h2 {
      margin: 0;
      font-size: 17px;
      min-width: 210px;
    }

    .timeline-bar button, .timeline-bar select {
      background: rgba(255,255,255,.1);
      color: #fff;
      border-color: rgba(255,255,255,.22);
    }

    .timeline-bar select {
      height: 38px;
      border-radius: 19px;
      padding: 0 12px;
      outline: none;
    }

    .timeline-help {
      margin-left: auto;
      color: rgba(255,255,255,.7);
      font-size: 12px;
    }

    #timeline3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    .empty {
      color: var(--muted);
      line-height: 1.55;
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.65);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #202124;
      color: #fff;
      border-radius: 20px;
      padding: 10px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 70;
      font-size: 13px;
    }

    .toast.show { opacity: 1; }

    .hidden-file { display: none; }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(17,24,39,.72);
    }

    .image-modal.open { display: grid; }

    .image-dialog {
      width: min(960px, 94vw);
      max-height: 90vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .image-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 720;
    }

    .image-dialog img {
      display: block;
      width: 100%;
      max-height: calc(90vh - 60px);
      object-fit: contain;
      background: #111827;
    }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-rows: auto 1fr; }
      .topbar { flex-wrap: wrap; }
      .brand { min-width: 0; width: 100%; }
      .search { order: 3; max-width: none; width: 100%; flex-basis: 100%; }
      .main { grid-template-columns: 1fr; }
      .board-shell { min-height: 68vh; }
      .side { border-left: 0; border-top: 1px solid var(--line); min-height: 420px; }
      .app.side-collapsed .side { display: none; }
      .tag-shelf { max-width: calc(100vw - 56px); }
      .timeline { inset: 0; }
      .timeline-bar { flex-wrap: wrap; height: auto; align-items: start; }
      .timeline-help { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="app side-collapsed" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M6 3h9l3 3v15H6V3z" fill="white" opacity=".92"/>
            <path d="M15 3v4h4" stroke="#202124" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 11h6M9 15h5" stroke="#202124" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </div>
        memo
      </div>
      <label class="search" aria-label="検索">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" placeholder="メモを検索">
      </label>
      <div class="toolbar">
        <select id="arrangeSelect" class="sort-control" title="2D整列">
          <option value="manual">手動配置</option>
          <option value="color">色順に整列</option>
          <option value="tag">タグ順に整列</option>
          <option value="updated">最新更新順に整列</option>
        </select>
        <select id="granularitySelect" class="sort-control" title="3D粒度" hidden>
          <option value="all">全粒度</option>
          <option value="note">メモ単位</option>
          <option value="paragraph">段落単位</option>
          <option value="word">言葉単位</option>
        </select>
        <select id="classifySelect" class="sort-control" title="3D分類" hidden>
          <option value="color">色単位</option>
          <option value="tag">タグ単位</option>
        </select>
        <button id="markdownToggle" title="Markdown表示切替">MD表示</button>
        <button id="view2DBtn" class="active" title="2D表示">2D</button>
        <button id="view3DBtn" title="3D表示">3D</button>
        <button id="addNote" class="primary" title="新規メモ">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          新規
        </button>
        <button id="importKeepBtn" title="Google Keepを取り込み">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12M8 11l4 4 4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Keep取込
        </button>
        <button id="historyBtn" title="履歴">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5M12 7v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          履歴
        </button>
      </div>
    </header>

    <main class="main">
      <section class="board-shell" aria-label="2次元付箋ボード">
        <div class="board" id="boardScroll">
          <div class="canvas" id="canvas"></div>
        </div>
      </section>

      <aside class="side" id="sidePanel">
        <div class="side-head">
          <div class="side-head-top">
            <h2 id="sideTitle">履歴</h2>
            <button id="closeSideBtn" class="icon" title="履歴パネルを閉じる">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <p id="sideSummary">メモを選ぶと、作成、本文全体、段落、言葉単位の更新履歴を確認できます。</p>
        </div>
        <div class="tabs">
          <button id="tabSelected" class="active">選択メモ</button>
          <button id="tabAll">全体</button>
          <button id="tabTree">ツリー</button>
        </div>
        <div class="panel">
          <div id="historyList" class="history-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <section class="timeline" id="timelineOverlay" aria-label="3D年表">
    <div class="timeline-bar">
      <h2>3D年表</h2>
      <select id="timelineScope">
        <option value="all">全粒度</option>
        <option value="note">メモ単位</option>
        <option value="paragraph">段落単位</option>
        <option value="word">言葉単位</option>
      </select>
      <button id="timelineReset">視点リセット</button>
      <button id="closeTimeline">閉じる</button>
      <div class="timeline-help">ドラッグで回転、ホイールでズーム。横軸が時間、奥行きが粒度です。</div>
    </div>
    <canvas id="timeline3d"></canvas>
  </section>

  <input id="imageInput" class="hidden-file" type="file" accept="image/*" multiple>
  <input id="keepImportInput" class="hidden-file" type="file" webkitdirectory directory multiple>
  <section class="image-modal" id="imageModal" aria-label="画像プレビュー">
    <div class="image-dialog">
      <div class="image-dialog-head">
        <span id="imageModalTitle">画像</span>
        <button id="closeImageModal">閉じる</button>
      </div>
      <img id="imageModalImg" alt="メモに貼り込んだ画像">
    </div>
  </section>
  <div id="toast" class="toast"></div>

  <script type="module">
    const STORE_KEY = "chrono-keep-board-v2";
    const palette = ["#fff8c7", "#d7f0ff", "#e2f4d7", "#fce3ef", "#e8e0ff", "#ffe3c2", "#dff3ec"];
    const typeLabel = { create: "作成", full: "本文全体", paragraph: "段落", word: "言葉" };
    const typeDepth = { create: -90, full: -30, paragraph: 35, word: 100 };
    const typeColor = { create: 0xea4335, full: 0x4285f4, paragraph: 0x34a853, word: 0xfbbc04 };

    let state = loadState();
    let selectedId = state.selectedId || state.notes[0]?.id || null;
    let historyMode = "selected";
    let drag = null;
    let tagDrag = null;
    let imageTargetId = null;
    let threeRuntime = null;
    let tag3dRuntime = null;
    let tag3dView = "front";
    let boardMode = "2d";
    let markdownPreview = false;
    let lastTag3DClick = null;
    let boardZoom = 1;
    let selectedRootIds = new Set();
    let contextMenuEl = null;
    let textMenuEl = null;
    let moveCommand = null;
    let viewCubeDrag = null;
    let skipAutoResolveOnce = false;

    const el = {
      app: document.getElementById("app"),
      boardScroll: document.getElementById("boardScroll"),
      canvas: document.getElementById("canvas"),
      arrangeSelect: document.getElementById("arrangeSelect"),
      granularitySelect: document.getElementById("granularitySelect"),
      classifySelect: document.getElementById("classifySelect"),
      markdownToggle: document.getElementById("markdownToggle"),
      view2DBtn: document.getElementById("view2DBtn"),
      view3DBtn: document.getElementById("view3DBtn"),
      addNote: document.getElementById("addNote"),
      importKeepBtn: document.getElementById("importKeepBtn"),
      keepImportInput: document.getElementById("keepImportInput"),
      historyBtn: document.getElementById("historyBtn"),
      closeSideBtn: document.getElementById("closeSideBtn"),
      historyList: document.getElementById("historyList"),
      tabSelected: document.getElementById("tabSelected"),
      tabAll: document.getElementById("tabAll"),
      tabTree: document.getElementById("tabTree"),
      searchInput: document.getElementById("searchInput"),
      imageInput: document.getElementById("imageInput"),
      imageModal: document.getElementById("imageModal"),
      imageModalTitle: document.getElementById("imageModalTitle"),
      imageModalImg: document.getElementById("imageModalImg"),
      closeImageModal: document.getElementById("closeImageModal"),
      toast: document.getElementById("toast"),
      timelineOverlay: document.getElementById("timelineOverlay"),
      timelineScope: document.getElementById("timelineScope"),
      timelineReset: document.getElementById("timelineReset"),
      closeTimeline: document.getElementById("closeTimeline"),
      timeline3d: document.getElementById("timeline3d"),
      sideTitle: document.getElementById("sideTitle"),
      sideSummary: document.getElementById("sideSummary")
    };

    if (state.notes.length === 0) {
      createNote({
        title: "最初のメモ",
        text: "ここに文章を書きます。\n\n段落ごとの更新と、言葉ごとの履歴が自動で残ります。",
        x: 90,
        y: 90,
        color: palette[0]
      });
      createNote({
        title: "画像メモ",
        text: "画像ボタンから写真やスクリーンショットを貼り込めます。",
        x: 390,
        y: 130,
        color: palette[1]
      });
    }

    render();

    el.closeSideBtn.addEventListener("click", () => {
      el.app.classList.add("side-collapsed");
    });

    el.boardScroll.addEventListener("pointerdown", startBoardPan);
    el.boardScroll.addEventListener("wheel", zoomBoardAtPointer, { passive: false });

    el.markdownToggle.addEventListener("click", () => {
      markdownPreview = !markdownPreview;
      el.markdownToggle.textContent = markdownPreview ? "MD編集" : "MD表示";
      renderNotes();
    });

    el.view2DBtn.addEventListener("click", () => {
      boardMode = "2d";
      el.view2DBtn.classList.add("active");
      el.view3DBtn.classList.remove("active");
      el.arrangeSelect.hidden = false;
      el.granularitySelect.hidden = true;
      el.classifySelect.hidden = true;
      renderNotes();
    });

    el.view3DBtn.addEventListener("click", () => {
      boardMode = "3d";
      el.view3DBtn.classList.add("active");
      el.view2DBtn.classList.remove("active");
      el.arrangeSelect.hidden = true;
      el.granularitySelect.hidden = false;
      el.classifySelect.hidden = false;
      renderNotes();
    });

    el.arrangeSelect.addEventListener("change", () => {
      if (el.arrangeSelect.value !== "manual") {
        arrangeNotes(el.arrangeSelect.value);
        el.arrangeSelect.value = "manual";
      } else {
        tag3dView = "front";
        renderNotes();
      }
    });

    el.granularitySelect.addEventListener("change", renderNotes);
    el.classifySelect.addEventListener("change", renderNotes);

    el.addNote.addEventListener("click", () => {
      const note = createNote({
        title: "無題のメモ",
        text: "",
        x: 120 + state.notes.length * 24,
        y: 120 + state.notes.length * 18,
        color: palette[state.notes.length % palette.length]
      });
      selectedId = note.id;
      persist();
      render();
      toast("新しいメモを作成しました");
    });

    el.importKeepBtn.addEventListener("click", () => {
      el.keepImportInput.click();
    });

    el.keepImportInput.addEventListener("change", async () => {
      const files = Array.from(el.keepImportInput.files || []);
      if (files.length === 0) return;
      try {
        const imported = await importGoogleKeepFiles(files);
        persist();
        render();
        toast(`${imported} 件のKeepメモを取り込みました`);
      } catch (error) {
        console.error(error);
        toast("Keepの取り込みに失敗しました");
      } finally {
        el.keepImportInput.value = "";
      }
    });

    el.historyBtn.addEventListener("click", () => {
      el.app.classList.remove("side-collapsed");
      historyMode = "selected";
      el.tabSelected.classList.add("active");
      el.tabAll.classList.remove("active");
      el.tabTree.classList.remove("active");
      document.getElementById("sidePanel").scrollIntoView({ block: "nearest", behavior: "smooth" });
      renderSidePanel();
    });

    // 3D年表は独立オーバーレイではなく、3Dボード内で表示します。
    el.closeTimeline.addEventListener("click", closeTimeline);
    el.timelineReset.addEventListener("click", () => {
      if (threeRuntime) {
        threeRuntime.camera.position.set(0, 360, 620);
        threeRuntime.controls.target.set(0, 0, 0);
        threeRuntime.controls.update();
      }
    });
    el.timelineScope.addEventListener("change", () => renderTimelineScene());

    el.tabSelected.addEventListener("click", () => {
      historyMode = "selected";
      el.tabSelected.classList.add("active");
      el.tabAll.classList.remove("active");
      el.tabTree.classList.remove("active");
      renderSidePanel();
    });

    el.tabAll.addEventListener("click", () => {
      historyMode = "all";
      el.tabAll.classList.add("active");
      el.tabSelected.classList.remove("active");
      el.tabTree.classList.remove("active");
      renderSidePanel();
    });

    el.tabTree.addEventListener("click", () => {
      historyMode = "tree";
      el.tabTree.classList.add("active");
      el.tabSelected.classList.remove("active");
      el.tabAll.classList.remove("active");
      renderSidePanel();
    });

    el.searchInput.addEventListener("input", renderNotes);

    el.historyList.addEventListener("click", (event) => {
      const imageLink = event.target.closest("[data-image-note]");
      if (imageLink) {
        const note = findNote(imageLink.dataset.imageNote);
        const image = note?.images[Number(imageLink.dataset.imageIndex)];
        if (image) openImageModal(image, note.title, Number(imageLink.dataset.imageIndex) + 1);
        return;
      }

      const noteLink = event.target.closest("[data-tree-note]");
      if (noteLink) {
        selectedId = noteLink.dataset.treeNote;
        historyMode = "selected";
        el.tabSelected.classList.add("active");
        el.tabAll.classList.remove("active");
        el.tabTree.classList.remove("active");
        persist();
        render();
      }
    });

    el.closeImageModal.addEventListener("click", closeImageModal);
    el.imageModal.addEventListener("click", (event) => {
      if (event.target === el.imageModal) closeImageModal();
    });

    el.imageInput.addEventListener("change", async () => {
      const note = findNote(imageTargetId);
      if (!note || el.imageInput.files.length === 0) return;
      const files = Array.from(el.imageInput.files).slice(0, 8);
      const images = await Promise.all(files.map(readFileAsDataURL));
      note.images.push(...images);
      recordEvent(note, "full", "画像を追加", `画像 ${images.length} 件を貼り込みました`);
      note.updatedAt = now();
      persist();
      render();
      el.imageInput.value = "";
      toast("画像を貼り込みました");
    });

    document.addEventListener("pointerdown", (event) => {
      if (moveCommand) {
        finishCommandMove(event);
        return;
      }
      if (!event.target.closest(".context-menu")) {
        closeContextMenus();
      }
    }, true);

    document.addEventListener("pointermove", (event) => {
      if (moveCommand) updateMoveArrow(event.clientX, event.clientY);
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        cancelCommandMove();
        closeContextMenus();
      }
      if (event.key === "Escape" && el.imageModal.classList.contains("open")) closeImageModal();
      if (event.key === "Escape" && el.timelineOverlay.classList.contains("open")) closeTimeline();
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "n") {
        event.preventDefault();
        el.addNote.click();
      }
    });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return { notes: [], selectedId: null, tags: [] };
        const parsed = JSON.parse(raw);
        const notes = Array.isArray(parsed.notes) ? parsed.notes.map(normalizeNote) : [];
        const tags = Array.isArray(parsed.tags) ? parsed.tags : uniqueTags(notes);
        return { notes, selectedId: parsed.selectedId || null, tags };
      } catch {
        return { notes: [], selectedId: null, tags: [] };
      }
    }

    function normalizeNote(note) {
      return {
        ...note,
        parentId: note.parentId || null,
        images: Array.isArray(note.images) ? note.images : [],
        tags: Array.isArray(note.tags) ? note.tags : [],
        collapsed: Boolean(note.collapsed),
        history: Array.isArray(note.history) ? note.history : [],
        lastText: note.lastText ?? note.text ?? "",
        localX: Number.isFinite(note.localX) ? note.localX : 8,
        localY: Number.isFinite(note.localY) ? note.localY : 8,
        w: note.w || 260,
        h: note.h || 188,
        textSize: note.textSize || "",
        textFont: note.textFont || "",
        textWidth: note.textWidth || "",
        textHeight: note.textHeight || ""
      };
    }

    function persist() {
      state.selectedId = selectedId;
      state.tags = uniqueTags(state.notes, state.tags);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function now() {
      return new Date().toISOString();
    }

    function uid() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function createNote(seed = {}) {
      const createdAt = now();
      const note = {
        id: uid(),
        parentId: seed.parentId || null,
        title: seed.title || "無題のメモ",
        text: seed.text || "",
        images: [],
        tags: seed.tags || [],
        collapsed: false,
        x: seed.x ?? 80,
        y: seed.y ?? 80,
        localX: seed.localX ?? 8,
        localY: seed.localY ?? 8,
        w: seed.w || (seed.parentId ? 230 : 260),
        h: seed.h || (seed.parentId ? 160 : 188),
        color: seed.color || palette[0],
        createdAt,
        updatedAt: createdAt,
        history: [],
        lastText: seed.text || ""
      };
      if (note.parentId) {
        const parentIndex = state.notes.findIndex(item => item.id === note.parentId);
        state.notes.splice(parentIndex + 1, 0, note);
      } else {
        state.notes.unshift(note);
      }
      recordEvent(note, "create", "メモ作成", note.text || note.title, createdAt);
      recordTextHistory(note, "", note.text || "", createdAt);
      if (note.parentId) {
        const parent = findNote(note.parentId);
        if (parent) {
          ensureParentFitsChildren(parent);
          parent.updatedAt = createdAt;
          recordEvent(parent, "full", "子メモ追加", note.title, createdAt);
        }
      }
      selectedId = note.id;
      persist();
      return note;
    }

    function createChildNote(parent) {
      if (parent.parentId) {
        toast("子付箋の中には子付箋を作れません。");
        return null;
      }
      const child = createNote({
        parentId: parent.id,
        title: "子メモ",
        text: "",
        localX: 10 + childNotes(parent.id).length * 18,
        localY: 10 + childNotes(parent.id).length * 18,
        color: parent.color
      });
      selectedId = child.id;
      persist();
      render();
      toast("子メモを貼り込みました");
    }

    async function importGoogleKeepFiles(files) {
      const jsonFiles = files.filter(file => file.name.toLowerCase().endsWith(".json"));
      const imageFiles = new Map(
        files
          .filter(file => file.type.startsWith("image/"))
          .map(file => [file.name, file])
      );
      let imported = 0;

      for (const file of jsonFiles) {
        const data = JSON.parse(await file.text());
        const note = googleKeepToNote(data, imported);
        note.images = await importKeepImages(data, imageFiles);
        state.notes.unshift(note);
        imported += 1;
      }

      selectedId = state.notes[0]?.id || selectedId;
      arrangeNotes("updated", false);
      return imported;
    }

    function googleKeepToNote(data, index) {
      const createdAt = keepTimestamp(data.createdTimestampUsec || data.createdTimestampMillis || data.createdAt);
      const updatedAt = keepTimestamp(data.userEditedTimestampUsec || data.updatedTimestampUsec || data.updatedAt) || createdAt;
      const title = data.title || "Google Keepメモ";
      const listText = Array.isArray(data.listContent)
        ? data.listContent.map(item => `${item.isChecked ? "[x]" : "[ ]"} ${item.text || ""}`).join("\n")
        : "";
      const text = [data.textContent || "", listText].filter(Boolean).join("\n");
      const note = {
        id: uid(),
        parentId: null,
        title,
        text,
        images: [],
        tags: keepLabels(data),
        collapsed: false,
        x: 90 + (index % 4) * 310,
        y: 90 + Math.floor(index / 4) * 240,
        localX: 8,
        localY: 8,
        w: 280,
        h: 210,
        color: keepColor(data.color),
        createdAt,
        updatedAt,
        history: [],
        lastText: text
      };
      recordEvent(note, "create", "Google Keepから取込", title, createdAt);
      recordTextHistory(note, "", text, updatedAt);
      if (note.tags.length) recordEvent(note, "full", "Keepラベル取込", note.tags.join(", "), updatedAt);
      return note;
    }

    async function importKeepImages(data, imageFiles) {
      const attachments = Array.isArray(data.attachments) ? data.attachments : [];
      const images = [];
      for (const attachment of attachments) {
        const path = attachment.filePath || attachment.file_path || attachment.name || "";
        const filename = path.split(/[\\/]/).pop();
        const file = imageFiles.get(filename);
        if (file) images.push(await readFileAsDataURL(file));
      }
      return images;
    }

    function keepLabels(data) {
      if (!Array.isArray(data.labels)) return [];
      return data.labels
        .map(label => typeof label === "string" ? label : label.name)
        .filter(Boolean)
        .slice(0, 8);
    }

    function keepTimestamp(value) {
      if (!value) return now();
      const num = Number(value);
      if (Number.isFinite(num)) {
        const millis = num > 9999999999999 ? Math.floor(num / 1000) : num;
        return new Date(millis).toISOString();
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? now() : parsed.toISOString();
    }

    function keepColor(color) {
      const map = {
        DEFAULT: palette[0],
        WHITE: "#fff8c7",
        RED: "#fce3ef",
        ORANGE: "#ffe3c2",
        YELLOW: "#fff8c7",
        GREEN: "#e2f4d7",
        TEAL: "#dff3ec",
        BLUE: "#d7f0ff",
        GRAY: "#f1f3f4"
      };
      return map[String(color || "DEFAULT").toUpperCase()] || palette[0];
    }

    function recordEvent(note, type, label, value, at = now()) {
      note.history.push({
        id: uid(),
        type,
        label,
        value: String(value || ""),
        at,
        noteId: note.id,
        noteTitle: note.title
      });
    }

    function recordTextHistory(note, oldText, newText, at = now()) {
      if (oldText === newText) return;
      recordEvent(note, "full", "本文更新", newText, at);

      const oldParagraphs = splitParagraphs(oldText);
      const newParagraphs = splitParagraphs(newText);
      newParagraphs.forEach((paragraph, index) => {
        if (paragraph && paragraph !== oldParagraphs[index]) {
          recordEvent(note, "paragraph", `段落 ${index + 1}`, paragraph, at);
        }
      });

      const oldWords = new Set(tokenize(oldText));
      tokenize(newText).forEach((word) => {
        if (!oldWords.has(word)) recordEvent(note, "word", word, word, at);
      });
    }

    function splitParagraphs(text) {
      return String(text || "")
        .split(/\\n\\s*\\n|\\n/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function tokenize(text) {
      const matches = String(text || "").match(/[\\p{Script=Han}\\p{Script=Hiragana}\\p{Script=Katakana}ー]+|[A-Za-z0-9_]+/gu);
      return matches ? matches.map(w => w.toLowerCase()) : [];
    }

    function findNote(id) {
      return state.notes.find(note => note.id === id);
    }

    function childNotes(parentId) {
      return state.notes
        .filter(note => note.parentId === parentId)
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    }

    function descendantIds(parentId) {
      const ids = [];
      const walk = (id) => {
        childNotes(id).forEach(child => {
          ids.push(child.id);
          walk(child.id);
        });
      };
      walk(parentId);
      return ids;
    }

    function noteMatchesQuery(note, query) {
      if (!query) return true;
      if (`${note.title} ${note.text} ${note.tags.join(" ")}`.toLowerCase().includes(query)) return true;
      return childNotes(note.id).some(child => noteMatchesQuery(child, query));
    }

    function parseTags(value) {
      return String(value || "")
        .split(/[,\s、，]+/)
        .map(tag => tag.trim())
        .filter(Boolean)
        .slice(0, 8);
    }

    function firstTag(note) {
      return (note.tags?.[0] || "").toLowerCase();
    }

    function uniqueTags(notes = state.notes, extra = []) {
      return [...new Set([...extra, ...notes.flatMap(note => note.tags || [])].filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function renderTagShelf() {
      const tags = uniqueTags(state.notes, state.tags);
      return `
        <div class="tag-shelf" data-tag-shelf="true">
          <input class="tag-create" id="tagCreateInput" placeholder="タグ追加">
          <button class="icon" id="tagCreateBtn" title="タグ追加">${iconPlus()}</button>
          ${tags.map(tag => renderTagSticker(tag)).join("")}
        </div>
      `;
    }

    function renderTagSticker(tag, noteId = "") {
      const source = noteId ? `data-source-note="${noteId}"` : "";
      return `<button class="tag-sticker${noteId ? " attached" : ""}" draggable="true" data-tag="${escapeAttr(tag)}" ${source}>${escapeHtml(tag)}</button>`;
    }

    function renderTag3DControls() {
      const active = (view) => view === tag3dView ? " active" : "";
      return `
        <div class="tag-3d-controls">
          <div class="view-cube" aria-label="ビューキューブ">
            <div class="view-cube-shell">
              <button type="button" data-view="front" class="${active("front")}">前</button>
              <button type="button" data-view="back" class="${active("back")}">後</button>
              <button type="button" data-view="right" class="${active("right")}">右</button>
              <button type="button" data-view="left" class="${active("left")}">左</button>
              <button type="button" data-view="top" class="${active("top")}">上</button>
              <button type="button" data-view="bottom" class="${active("bottom")}">下</button>
            </div>
          </div>
        </div>
      `;
    }

    function wireTag3DControls() {
      el.canvas.querySelectorAll(".view-cube-shell [data-view]").forEach(button => {
        const readView = () => button.dataset.view;
        const chooseView = (event) => {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
          setTag3DView(readView());
        };
        button.addEventListener("pointerdown", chooseView, true);
        button.addEventListener("mousedown", chooseView, true);
        button.addEventListener("click", chooseView, true);
      });
      const cube = el.canvas.querySelector(".view-cube");
      const shell = el.canvas.querySelector(".view-cube-shell");
      if (!cube || !shell) return;
      cube.addEventListener("click", (event) => {
        const face = event.target.closest(".view-cube-shell [data-view]");
        if (face) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          setTag3DView(face.dataset.view);
          return;
        }
        if (viewCubeDrag) return;
        const view = viewFromCubePoint(cube, event.clientX, event.clientY);
        if (view) setTag3DView(view);
      }, true);
      cube.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".view-cube-shell [data-view]")) return;
        event.preventDefault();
        cube.setPointerCapture(event.pointerId);
        cube.classList.add("dragging");
        viewCubeDrag = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          yaw: Number(cube.dataset.yaw || 38),
          pitch: Number(cube.dataset.pitch || -26)
        };
      });
      cube.addEventListener("pointermove", (event) => {
        if (!viewCubeDrag || event.pointerId !== viewCubeDrag.pointerId) return;
        const yaw = viewCubeDrag.yaw + (event.clientX - viewCubeDrag.startX) * .6;
        const pitch = Math.max(-82, Math.min(82, viewCubeDrag.pitch - (event.clientY - viewCubeDrag.startY) * .45));
        cube.dataset.yaw = String(yaw);
        cube.dataset.pitch = String(pitch);
        shell.style.transform = `rotateX(${pitch}deg) rotateY(${yaw}deg)`;
        rotateTag3DViewFromCube(yaw, pitch);
      });
      const finish = () => {
        cube.classList.remove("dragging");
        viewCubeDrag = null;
      };
      cube.addEventListener("pointerup", finish);
      cube.addEventListener("pointercancel", finish);
    }

    function setTag3DView(view) {
      tag3dView = view || "front";
      el.canvas.className = `canvas tag-3d view-${tag3dView}`;
      el.canvas.querySelectorAll("[data-view]").forEach(item => item.classList.toggle("active", item.dataset.view === tag3dView));
      if (tag3dRuntime?.camera) {
        setTag3DCamera(tag3dRuntime.camera);
        tag3dRuntime.controls?.target.set(0, -120, 60);
        tag3dRuntime.controls?.update();
        tag3dRuntime.renderFrame?.();
      } else {
        renderNotes();
      }
    }

    function viewFromCubePoint(cube, clientX, clientY) {
      const rect = cube.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;
      if (y < .33) return "top";
      if (y > .68) return "bottom";
      if (x < .34) return "left";
      if (x > .68) return "right";
      return "front";
    }

    function rotateTag3DViewFromCube(yaw, pitch) {
      const runtime = tag3dRuntime;
      if (!runtime) return;
      const radius = 1500;
      const yawRad = yaw * Math.PI / 180;
      const pitchRad = pitch * Math.PI / 180;
      const x = Math.sin(yawRad) * Math.cos(pitchRad) * radius;
      const y = -120 + Math.sin(-pitchRad) * radius;
      const z = Math.cos(yawRad) * Math.cos(pitchRad) * radius;
      runtime.camera.position.set(x, y, z);
      runtime.camera.lookAt(0, -120, 60);
      runtime.controls?.target.set(0, -120, 60);
      runtime.controls?.update();
      runtime.renderFrame?.();
    }

    function renderTags(note) {
      return note.tags.length ? note.tags.map(tag => renderTagSticker(tag, note.id)).join("") : "";
    }

    function renderMarkdownBody(note, scope, textMaxHeight = "") {
      const styles = [];
      if (note.textWidth) styles.push(`width:${escapeAttr(note.textWidth)}`);
      if (note.textHeight) {
        styles.push(`height:${escapeAttr(note.textHeight)}`);
      } else {
        styles.push(`height:${defaultTextHeight(note, textMaxHeight)}px`);
      }
      if (textMaxHeight) styles.push(`--text-max-height:${textMaxHeight}px`);
      const styleAttr = styles.length ? ` style="${styles.join(";")}"` : "";
      if (markdownPreview) {
        return `<div class="markdown-preview ${scope}-text" contenteditable="true" aria-label="本文プレビュー"${styleAttr}>${markdownToHtml(note.text)}</div>`;
      }
      return `<textarea class="${scope}-text" aria-label="本文" placeholder="メモを書く"${styleAttr}>${escapeHtml(note.text)}</textarea>`;
    }

    function defaultTextHeight(note, textMaxHeight = "") {
      const maxHeight = Number.parseFloat(textMaxHeight) || maxTextHeightForNote(note);
      const preferred = childNotes(note.id).length
        ? Math.min(96, maxHeight)
        : Math.max(56, (note.h || 188) - (note.parentId ? 104 : 132));
      return Math.max(42, Math.min(maxHeight, preferred));
    }

    function wireMarkdownBody(scope, note, baseSelector = "") {
      const previewSelector = baseSelector ? `${baseSelector}.markdown-preview` : ".markdown-preview";
      const textareaSelector = baseSelector ? `${baseSelector}` : "textarea";
      const preview = scope.querySelector(previewSelector);
      if (preview) {
        preview.addEventListener("mousedown", (event) => markTextResizeGesture(event, preview));
        preview.addEventListener("contextmenu", (event) => {
          if (hasTextSelection(preview)) openTextContextMenu(event, note, preview);
        });
        preview.addEventListener("mouseup", () => {
          growNoteForTextField(note, preview);
          rememberTextFieldSize(note, preview);
        });
        preview.addEventListener("blur", () => updateNoteText(note, htmlToMarkdown(preview)));
        return;
      }
      const textarea = scope.querySelector(textareaSelector);
      if (!textarea) return;
      textarea.addEventListener("mousedown", (event) => markTextResizeGesture(event, textarea));
      textarea.addEventListener("contextmenu", (event) => {
        if (hasTextSelection(textarea)) openTextContextMenu(event, note, textarea);
      });
      textarea.addEventListener("input", () => {
        if (!note.textHeight) textarea.style.height = `${Math.min(textarea.scrollHeight, Number.parseFloat(getComputedStyle(textarea).maxHeight) || 150)}px`;
        growNoteForTextField(note, textarea);
      });
      textarea.addEventListener("mouseup", () => {
        growNoteForTextField(note, textarea);
        rememberTextFieldSize(note, textarea);
      });
      textarea.addEventListener("change", () => updateNoteText(note, textarea.value));
    }

    function rememberTextFieldSize(note, field) {
      const rect = field.getBoundingClientRect();
      const width = Math.round(rect.width / boardZoom);
      const height = Math.round(rect.height / boardZoom);
      const defaultWidth = Math.max(160, (note.w || 260) - 28);
      const defaultHeight = Math.min(96, maxTextHeightForNote(note));
      if (Math.abs(width - defaultWidth) < 6) {
        note.textWidth = "";
      } else {
        note.textWidth = `${Math.max(90, Math.min(defaultWidth, width))}px`;
      }
      if (Math.abs(height - defaultHeight) < 6) {
        note.textHeight = "";
      } else {
        note.textHeight = `${Math.max(42, Math.min(maxTextHeightForNote(note), height))}px`;
      }
      persist();
    }

    function markTextResizeGesture(event, field) {
      const rect = field.getBoundingClientRect();
      const nearRight = rect.right - event.clientX <= 18;
      const nearBottom = rect.bottom - event.clientY <= 18;
      field.dataset.resizeGesture = nearRight || nearBottom ? "true" : "";
      field.dataset.resizeStartWidth = String(rect.width / boardZoom);
      field.dataset.resizeStartHeight = String(rect.height / boardZoom);
    }

    function maxTextHeightForNote(note) {
      return Math.max(52, (note.h || 188) - (note.parentId ? 102 : 122));
    }

    function growNoteForTextField(note, field) {
      if (!note || boardMode === "3d") return;
      const card = note.parentId
        ? document.querySelector(`.child-note[data-child-id="${note.id}"]`)
        : document.querySelector(`.note[data-id="${note.id}"]`);
      if (!card || !field) return;
      const fieldRect = field.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const rightOverflow = Math.ceil((fieldRect.right - (cardRect.right - 16)) / boardZoom);
      const bottomOverflow = Math.ceil((fieldRect.bottom - (cardRect.bottom - 18)) / boardZoom);
      const resizedAtEdge = field.dataset.resizeGesture === "true";
      const startFieldWidth = Number.parseFloat(field.dataset.resizeStartWidth || "");
      const startFieldHeight = Number.parseFloat(field.dataset.resizeStartHeight || "");
      const currentFieldWidth = fieldRect.width / boardZoom;
      const currentFieldHeight = fieldRect.height / boardZoom;
      const widthDelta = Number.isFinite(startFieldWidth) ? Math.max(0, currentFieldWidth - startFieldWidth) : 0;
      const heightDelta = Number.isFinite(startFieldHeight) ? Math.max(0, currentFieldHeight - startFieldHeight) : 0;
      const nearRightEdge = cardRect.right - fieldRect.right <= 24;
      const nearBottomEdge = cardRect.bottom - fieldRect.bottom <= 24;
      let changed = false;
      if (rightOverflow > 0) {
        note.w = Math.min(1400, (note.w || card.offsetWidth || 260) + rightOverflow + 28);
        changed = true;
      } else if (resizedAtEdge && widthDelta > 1) {
        note.w = Math.min(1400, (note.w || card.offsetWidth || 260) + Math.ceil(widthDelta) + 28);
        changed = true;
      } else if (resizedAtEdge && nearRightEdge) {
        note.w = Math.min(1400, (note.w || card.offsetWidth || 260) + 96);
        note.textWidth = `${Math.max(90, (note.w || 260) - 28)}px`;
        changed = true;
      }
      if (bottomOverflow > 0) {
        const delta = bottomOverflow + 28;
        note.h = Math.min(1200, (note.h || card.offsetHeight || 188) + delta);
        changed = true;
      } else if (resizedAtEdge && heightDelta > 1) {
        note.h = Math.min(1200, (note.h || card.offsetHeight || 188) + Math.ceil(heightDelta) + 28);
        changed = true;
      } else if (resizedAtEdge && nearBottomEdge) {
        const delta = 96;
        note.h = Math.min(1200, (note.h || card.offsetHeight || 188) + delta);
        note.textHeight = `${Math.min(maxTextHeightForNote(note), Math.max(42, Number.parseFloat(note.textHeight || "") || fieldRect.height / boardZoom))}px`;
        changed = true;
      }
      field.dataset.resizeGesture = "";
      field.dataset.resizeStartWidth = "";
      field.dataset.resizeStartHeight = "";
      if (!changed) return;
      autoFitNoteInternals(note);
      if (note.parentId) {
        const parent = findNote(note.parentId);
        if (parent) ensureParentFitsChildren(parent);
      }
      note.updatedAt = now();
      persist();
      renderNotes();
    }

    function autoFitNoteInternals(note) {
      const maxWidth = Math.max(90, (note.w || 260) - 28);
      if (note.textWidth) {
        const width = Math.min(maxWidth, Number.parseFloat(note.textWidth) || maxWidth);
        note.textWidth = `${width}px`;
      }
      const maxHeight = maxTextHeightForNote(note);
      if (note.textHeight) {
        const height = Math.min(maxHeight, Number.parseFloat(note.textHeight) || maxHeight);
        note.textHeight = `${Math.max(42, height)}px`;
      }
    }

    function updateNoteText(note, value) {
      const at = now();
      const oldText = note.lastText || "";
      note.text = value;
      recordTextHistory(note, oldText, note.text, at);
      note.lastText = note.text;
      note.updatedAt = at;
      persist();
      render();
    }

    function markdownToHtml(markdown) {
      const lines = escapeHtml(markdown || "").split("\n");
      const html = [];
      let inList = false;
      for (const line of lines) {
        if (/^\s*[-*]\s+/.test(line)) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${inlineMarkdown(line.replace(/^\s*[-*]\s+/, ""))}</li>`);
          continue;
        }
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
        if (/^###\s+/.test(line)) html.push(`<h3>${inlineMarkdown(line.replace(/^###\s+/, ""))}</h3>`);
        else if (/^##\s+/.test(line)) html.push(`<h2>${inlineMarkdown(line.replace(/^##\s+/, ""))}</h2>`);
        else if (/^#\s+/.test(line)) html.push(`<h1>${inlineMarkdown(line.replace(/^#\s+/, ""))}</h1>`);
        else if (/^>\s+/.test(line)) html.push(`<blockquote>${inlineMarkdown(line.replace(/^>\s+/, ""))}</blockquote>`);
        else if (line.trim()) html.push(`<p>${inlineMarkdown(line)}</p>`);
      }
      if (inList) html.push("</ul>");
      return html.join("");
    }

    function inlineMarkdown(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/`(.+?)`/g, "<code>$1</code>");
    }

    function htmlToMarkdown(element) {
      const walk = (node) => {
        if (node.nodeType === Node.TEXT_NODE) return node.textContent;
        if (node.nodeType !== Node.ELEMENT_NODE) return "";
        const content = Array.from(node.childNodes).map(walk).join("");
        const tag = node.tagName.toLowerCase();
        if (tag === "h1") return `# ${content}\n\n`;
        if (tag === "h2") return `## ${content}\n\n`;
        if (tag === "h3") return `### ${content}\n\n`;
        if (tag === "strong" || tag === "b") return `**${content}**`;
        if (tag === "em" || tag === "i") return `*${content}*`;
        if (tag === "code") return `\`${content}\``;
        if (tag === "blockquote") return `> ${content}\n\n`;
        if (tag === "li") return `- ${content}\n`;
        if (tag === "p" || tag === "div") return `${content}\n\n`;
        return content;
      };
      return Array.from(element.childNodes).map(walk).join("").replace(/\n{3,}/g, "\n\n").trim();
    }

    function updateTags(note, value) {
      const nextTags = parseTags(value);
      if (nextTags.join("\n") === note.tags.join("\n")) return;
      note.tags = nextTags;
      note.updatedAt = now();
      recordEvent(note, "full", "タグ更新", note.tags.join(", "));
      persist();
      render();
    }

    function addGlobalTag(tag) {
      const value = tag.trim();
      if (!value) return;
      state.tags = uniqueTags(state.notes, [...state.tags, value]);
      persist();
      render();
      toast("タグを追加しました");
    }

    function addTagToNote(note, tag) {
      if (!note || !tag || note.tags.includes(tag)) return;
      note.tags.push(tag);
      state.tags = uniqueTags(state.notes, [...state.tags, tag]);
      note.updatedAt = now();
      recordEvent(note, "full", "タグ貼り付け", tag);
      persist();
      render();
    }

    function removeTagFromNote(note, tag) {
      if (!note || !tag || !note.tags.includes(tag)) return;
      note.tags = note.tags.filter(item => item !== tag);
      note.updatedAt = now();
      recordEvent(note, "full", "タグ取り外し", tag);
      persist();
      render();
    }

    function arrangeNotes(mode, showToast = true) {
      const sorted = state.notes
        .filter(note => !note.parentId)
        .sort((a, b) => {
          if (mode === "color") return a.color.localeCompare(b.color) || a.title.localeCompare(b.title, "ja");
          if (mode === "tag") return firstTag(a).localeCompare(firstTag(b), "ja") || new Date(b.updatedAt) - new Date(a.updatedAt);
          if (mode === "updated") return new Date(b.updatedAt) - new Date(a.updatedAt);
          return 0;
        });

      arrangeFlat(sorted);
      persist();
      render();
      if (showToast) toast("メモを整列しました");
    }

    function arrangeFlat(sorted) {
      const startX = 80;
      const startY = 110;
      const maxColumns = 4;
      const columnWidth = Math.max(330, ...sorted.map(note => (note.w || 260) + 56));
      const rowHeight = Math.max(230, ...sorted.map(note => (note.h || 188) + 58));
      sorted.forEach((note, index) => {
        note.x = startX + (index % maxColumns) * columnWidth;
        note.y = startY + Math.floor(index / maxColumns) * rowHeight;
      });
    }

    function render() {
      renderNotes();
      renderSidePanel();
    }

    function renderNotes() {
      const query = el.searchInput.value.trim().toLowerCase();
      const isTag3D = boardMode === "3d";
      harmonizeChildColors();
      let fittedAny = false;
      state.notes.filter(note => !note.parentId).forEach(parent => {
        fittedAny = ensureParentFitsChildren(parent) || fittedAny;
      });
      if (fittedAny) persist();
      if (!isTag3D && !skipAutoResolveOnce) resolveRootOverlaps(null, 1);
      skipAutoResolveOnce = false;
      const notes = [...state.notes]
        .filter(note => !note.parentId)
        .sort((a, b) => {
          if (isTag3D) return new Date(b.updatedAt) - new Date(a.updatedAt);
          return new Date(b.updatedAt) - new Date(a.updatedAt);
        })
        .filter(note => noteMatchesQuery(note, query));

      el.canvas.className = `canvas${isTag3D ? ` tag-3d view-${tag3dView}` : ""}`;
      el.canvas.style.transform = isTag3D ? "" : `scale(${boardZoom})`;
      el.canvas.style.transformOrigin = "0 0";
      el.canvas.innerHTML = renderTagShelf() + (isTag3D ? renderTag3DControls() + `<canvas class="tag3d-webgl" id="tag3dCanvas"></canvas>` : "");
      wireTagShelf();
      if (isTag3D) wireTag3DControls();
      notes.forEach(note => {
        const children = childNotes(note.id);
        const card = document.createElement("article");
        const isSelected = note.id === selectedId || selectedRootIds.has(note.id);
        card.className = `note${isSelected ? " selected" : ""}${note.collapsed ? " collapsed" : ""}`;
        card.style.left = `${note.x}px`;
        card.style.top = `${note.y}px`;
        card.style.width = `${note.w || 260}px`;
        card.style.height = `${note.h || 188}px`;
        card.style.background = note.color;
        card.style.setProperty("--note-font-size", note.textSize || "12px");
        card.style.setProperty("--note-font-family", note.textFont || "system-ui, sans-serif");
        card.style.setProperty("--z", `${note.depth || 0}px`);
        card.dataset.id = note.id;
        card.innerHTML = `
          <div class="note-head">
            <input class="note-title" value="${escapeAttr(note.title)}" aria-label="タイトル">
            <span class="head-actions">
              <button class="image" title="画像を追加">${iconImage()}</button>
              <button class="history" title="このメモの履歴">${iconHistory()}</button>
              <button class="delete" title="削除">${iconTrash()}</button>
            </span>
          </div>
          <div class="note-meta">${formatDate(note.createdAt)} 作成 / ${formatDate(note.updatedAt)} 更新</div>
          ${renderMarkdownBody(note, "note", maxTextHeightForNote(note))}
          <div class="note-body">
            <div class="tag-row">${renderTags(note)}</div>
            <div class="note-images">${note.images.map(src => `<img src="${src}" alt="貼り込んだ画像">`).join("")}</div>
            <div class="child-notes" style="--child-area-height:${childAreaHeight(children)}px">${children.map(child => renderChildNote(child)).join("")}</div>
          </div>
          <button class="note-resize" title="付箋を拡大縮小" aria-label="付箋を拡大縮小"></button>
        `;

        card.addEventListener("pointerdown", (event) => {
          if (event.target.closest(".child-note")) return;
          if (event.target === card || isNoteEdgePointer(event, card)) {
            startDrag(event, note, card);
            return;
          }
          if (event.ctrlKey || event.metaKey) {
            selectedRootIds.has(note.id) ? selectedRootIds.delete(note.id) : selectedRootIds.add(note.id);
            selectedId = note.id;
          } else {
            selectedRootIds.clear();
            selectedId = note.id;
          }
          persist();
          renderSidePanel();
          document.querySelectorAll(".note").forEach(n => n.classList.toggle("selected", n.dataset.id === selectedId || selectedRootIds.has(n.dataset.id)));
        });
        card.addEventListener("mousemove", (event) => {
          if (event.target.closest(".child-note")) {
            card.classList.remove("edge-drag");
            return;
          }
          card.classList.toggle("edge-drag", isNoteEdgePointer(event, card));
        });
        card.addEventListener("mouseleave", () => card.classList.remove("edge-drag"));

        const head = card.querySelector(".note-head");
        head.addEventListener("pointerdown", (event) => {
          if (event.target.closest("button,input")) return;
          startDrag(event, note, card);
        });
        head.addEventListener("mousedown", (event) => {
          if (event.target.closest("button,input")) return;
          startMouseDrag(event, note, card);
        });
        const resizeHandle = Array.from(card.children).find(child => child.classList?.contains("note-resize"));
        resizeHandle.addEventListener("pointerdown", (event) => startNoteResize(event, note, card), true);
        resizeHandle.addEventListener("mousedown", (event) => startNoteMouseResize(event, note, card), true);
        card.addEventListener("contextmenu", (event) => openNoteContextMenu(event, note));
        card.addEventListener("dblclick", (event) => {
          if (event.target.closest("button,textarea")) return;
          toggleCollapsed(note);
        });
        wireNoteTagDrop(card, note);

        const title = card.querySelector(".note-title");
        title.addEventListener("change", () => {
          note.title = title.value.trim() || "無題のメモ";
          note.updatedAt = now();
          recordEvent(note, "full", "タイトル更新", note.title);
          persist();
          render();
        });

        wireMarkdownBody(card, note, ".note-text");

        card.querySelector(".image").addEventListener("click", (event) => {
          event.stopPropagation();
          imageTargetId = note.id;
          el.imageInput.click();
        });

        card.querySelector(".history").addEventListener("click", (event) => {
          event.stopPropagation();
          selectedId = note.id;
          historyMode = "selected";
          el.tabSelected.classList.add("active");
          el.tabAll.classList.remove("active");
          el.tabTree.classList.remove("active");
          persist();
          render();
        });

        card.querySelector(".delete").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNoteTree(note.id);
          persist();
          render();
          toast("メモを削除しました");
        });

        wireChildNotes(card);

        card.addEventListener("mouseup", () => {
          const rect = card.getBoundingClientRect();
          const canvasRect = el.canvas.getBoundingClientRect();
          note.w = Math.round(rect.width / boardZoom);
          note.h = Math.round(rect.height / boardZoom);
          note.x = Math.round((rect.left - canvasRect.left) / boardZoom);
          note.y = Math.round((rect.top - canvasRect.top) / boardZoom);
          resolveRootOverlaps(null, 1);
          persist();
        });

        el.canvas.appendChild(card);
      });
      wireTagStickers(el.canvas);
      if (isTag3D) {
        renderTag3DScene(notes);
      } else if (tag3dRuntime) {
        tag3dRuntime = null;
      }
    }

    function renderChildNote(child) {
      return `
        <section class="child-note${child.id === selectedId ? " selected" : ""}${child.collapsed ? " collapsed" : ""}" data-child-id="${child.id}" style="left:${child.localX || 8}px; top:${child.localY || 8}px; width:${child.w || 230}px; height:${child.h || 160}px; background:${child.color}; --note-font-size:${child.textSize || "12px"}; --note-font-family:${child.textFont || "system-ui, sans-serif"}">
          <div class="child-head">
            <input class="child-title" value="${escapeAttr(child.title)}" aria-label="子メモタイトル">
            <span class="head-actions">
              <button class="child-image" title="画像を追加">${iconImage()}</button>
              <button class="child-history" title="このメモの履歴">${iconHistory()}</button>
              <button class="child-delete" title="削除">${iconTrash()}</button>
            </span>
          </div>
          <div class="child-meta">${formatDate(child.createdAt)} 作成 / ${formatDate(child.updatedAt)} 更新</div>
          ${renderMarkdownBody(child, "child", maxTextHeightForNote(child))}
          <div class="note-body">
            <div class="tag-row child-tags">${renderTags(child)}</div>
            <div class="note-images">${child.images.map(src => `<img src="${src}" alt="貼り込んだ画像">`).join("")}</div>
          </div>
          <button class="note-resize" title="付箋を拡大縮小" aria-label="付箋を拡大縮小"></button>
        </section>
      `;
    }

    function wireChildNotes(scope) {
      scope.querySelectorAll(".child-note").forEach(childCard => {
        const child = findNote(childCard.dataset.childId);
        if (!child) return;

        childCard.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
          if (event.target === childCard || isNoteEdgePointer(event, childCard)) {
            startChildDrag(event, child, childCard);
            return;
          }
          selectedId = child.id;
          persist();
          renderSidePanel();
          document.querySelectorAll(".child-note").forEach(item => item.classList.toggle("selected", item.dataset.childId === selectedId));
        });
        childCard.addEventListener("mousemove", (event) => {
          childCard.classList.toggle("edge-drag", isNoteEdgePointer(event, childCard));
        });
        childCard.addEventListener("mouseleave", () => childCard.classList.remove("edge-drag"));

        childCard.addEventListener("dblclick", (event) => {
          if (event.target.closest("button,textarea")) return;
          event.stopPropagation();
          toggleCollapsed(child);
        });
        childCard.addEventListener("contextmenu", (event) => openNoteContextMenu(event, child));
        wireNoteTagDrop(childCard, child);

        childCard.querySelector(".child-head").addEventListener("pointerdown", (event) => {
          if (event.target.closest("input,button")) return;
          startChildDrag(event, child, childCard);
        });
        childCard.querySelector(".child-head").addEventListener("mousedown", (event) => {
          if (event.target.closest("input,button")) return;
          startChildMouseDrag(event, child, childCard);
        });

        childCard.querySelector(".child-title").addEventListener("change", (event) => {
          child.title = event.target.value.trim() || "子メモ";
          child.updatedAt = now();
          recordEvent(child, "full", "タイトル更新", child.title);
          persist();
          render();
        });

        wireMarkdownBody(childCard, child);

        const resizeHandle = Array.from(childCard.children).find(child => child.classList?.contains("note-resize"));
        resizeHandle.addEventListener("pointerdown", (event) => startNoteResize(event, child, childCard), true);
        resizeHandle.addEventListener("mousedown", (event) => startNoteMouseResize(event, child, childCard), true);

        childCard.querySelector(".child-image").addEventListener("click", (event) => {
          event.stopPropagation();
          imageTargetId = child.id;
          el.imageInput.click();
        });

        childCard.querySelector(".child-history").addEventListener("click", (event) => {
          event.stopPropagation();
          selectedId = child.id;
          historyMode = "selected";
          el.tabSelected.classList.add("active");
          el.tabAll.classList.remove("active");
          el.tabTree.classList.remove("active");
          persist();
          render();
        });

        childCard.querySelector(".child-delete").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteNoteTree(child.id);
          persist();
          render();
          toast("子メモを削除しました");
        });
      });
