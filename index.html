      el.sideTitle.textContent = historyMode === "all" ? "全メモの履歴" : selected ? `${selected.title} の履歴` : "履歴";
      el.sideSummary.textContent = historyMode === "all"
        ? "すべてのメモの作成、本文全体、段落、言葉単位の更新を時系列で表示します。"
        : "選択中メモの粒度別履歴を時系列で表示します。";

      if (events.length === 0) {
        el.historyList.innerHTML = `<div class="empty">履歴はまだありません。</div>`;
        return;
      }

      el.historyList.innerHTML = events.map(event => `
        <div class="event">
          <div class="event-top">
            <span class="pill ${event.type}">${typeLabel[event.type] || event.type}</span>
            <span>${formatDateTime(event.at)}</span>
          </div>
          <div class="event-note">${escapeHtml(event.noteTitle || findNote(event.noteId)?.title || "メモ")}</div>
          <div class="event-body">${escapeHtml(event.label)}${event.value ? "\\n" + escapeHtml(event.value) : ""}</div>
        </div>
      `).join("");
    }

    function getVisibleEvents() {
      if (historyMode !== "all" && !selectedId) return [];
      const source = historyMode === "all"
        ? state.notes
        : state.notes.filter(note => note.id === selectedId || descendantIds(selectedId).includes(note.id));
      return source.flatMap(note => note.history.map(event => ({ ...event, noteTitle: note.title })))
        .sort((a, b) => new Date(b.at) - new Date(a.at));
    }

    function renderTreeList() {
      const roots = state.notes
        .filter(note => !note.parentId)
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

      el.sideTitle.textContent = "メモツリー";
      el.sideSummary.textContent = "包含関係をテキストだけで表示します。画像はリンクとして並び、押すとポップアップで開きます。";

      if (roots.length === 0) {
        el.historyList.innerHTML = `<div class="empty">ツリー化できるメモはまだありません。</div>`;
        return;
      }

      el.historyList.innerHTML = `<div class="tree-list">${roots.map(note => renderTreeItem(note, 0)).join("")}</div>`;
    }

    function renderTreeItem(note, depth) {
      const children = childNotes(note.id);
      const images = note.images.map((_, index) => `
        <button class="tree-image-link" data-image-note="${note.id}" data-image-index="${index}">画像${index + 1}</button>
      `).join("");

      return `
        <div class="tree-item" style="margin-left:${depth * 16}px">
          <button class="tree-title tree-note-link" data-tree-note="${note.id}">${escapeHtml(note.title)}</button>
          <div class="tree-text">${escapeHtml(note.text || "本文なし")}</div>
          ${images ? `<div class="tree-images">${images}</div>` : ""}
        </div>
        ${children.map(child => renderTreeItem(child, depth + 1)).join("")}
      `;
    }

    function openImageModal(src, noteTitle, imageNumber) {
      el.imageModalTitle.textContent = `${noteTitle} / 画像${imageNumber}`;
      el.imageModalImg.src = src;
      el.imageModal.classList.add("open");
    }

    function closeImageModal() {
      el.imageModal.classList.remove("open");
      el.imageModalImg.removeAttribute("src");
    }

    async function renderTag3DScene(notes) {
      const canvas = document.getElementById("tag3dCanvas");
      if (!canvas) return;
      try {
        const { THREE, OrbitControls } = await loadThreeBundle();
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(el.canvas.clientWidth, el.canvas.clientHeight, false);
        renderer.setClearColor(0xffffff, 1);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 1900, 4200);
        const aspect = el.canvas.clientWidth / el.canvas.clientHeight;
        const viewSize = 1180;
        const camera = new THREE.OrthographicCamera(
          -viewSize * aspect / 2,
          viewSize * aspect / 2,
          viewSize / 2,
          -viewSize / 2,
          -3000,
          5000
        );
        setTag3DCamera(camera);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = .08;
        controls.enablePan = true;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.1;
        controls.rotateSpeed = .72;
        controls.screenSpacePanning = true;
        controls.target.set(0, -120, 60);
        controls.mouseButtons = {
          LEFT: THREE.MOUSE.PAN,
          MIDDLE: THREE.MOUSE.DOLLY,
          RIGHT: THREE.MOUSE.ROTATE
        };

        scene.add(new THREE.HemisphereLight(0xffffff, 0xdadce0, 2.2));
        const light = new THREE.DirectionalLight(0xffffff, 1.9);
        light.position.set(420, 780, 620);
        light.castShadow = true;
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        scene.add(light);

        const events = get3DBoardEvents(notes);
        const selectable = [];
        const years = events.map(event => new Date(event.at).getFullYear());
        const minYear = Math.min(...years, new Date().getFullYear());
        const maxYear = Math.max(...years, minYear);
        const yearRange = Math.max(1, maxYear - minYear);
        const categories = [...new Set(events.map(event => event.category))].sort((a, b) => a.localeCompare(b, "ja"));
        const colorGroups = [...new Set(events.map(event => event.colorName))].sort((a, b) => a.localeCompare(b, "ja"));
        const categoryGap = 320;
        const categoryBaseX = -420;
        const planeWidth = Math.max(1700, categories.length * categoryGap + 700);
        const planeDepth = 1200;
        const planeY = -300;
        const centimeter = 20;

        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(planeWidth, planeDepth),
          new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .76, metalness: 0 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.set(0, planeY - 1, 160);
        plane.receiveShadow = true;
        scene.add(plane);

        const grid = new THREE.GridHelper(planeWidth, Math.round(planeWidth / centimeter), 0xd2d6dc, 0xe6e8eb);
        grid.position.set(0, planeY, 160);
        grid.material.opacity = .9;
        grid.material.transparent = true;
        scene.add(grid);

        const axisMaterial = new THREE.LineBasicMaterial({ color: 0x9aa0a6 });
        const yAxis = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-planeWidth / 2 + 120, planeY, -420),
          new THREE.Vector3(-planeWidth / 2 + 120, 420, -420)
        ]);
        scene.add(new THREE.Line(yAxis, axisMaterial));

        categories.forEach((category, index) => {
          const x = categoryBaseX - ((categories.length - 1) * categoryGap) / 2 + index * categoryGap;
          const label = makeLabel(THREE, category, el.classifySelect.value === "tag" ? "タグ" : "色", "");
          label.position.set(x, planeY + 24, -390);
          label.rotation.x = -Math.PI / 7;
          scene.add(label);
        });

        colorGroups.forEach((colorGroup, index) => {
          const z = colorDepth(colorGroup, colorGroups);
          const label = makeLabel(THREE, colorGroup, "色奥行き", "");
          label.position.set(planeWidth / 2 - 210, planeY + 26, z);
          label.rotation.x = -Math.PI / 7;
          scene.add(label);
        });

        for (let year = minYear; year <= maxYear; year++) {
          const y = minYear === maxYear ? 80 : -170 + ((year - minYear) / yearRange) * 560;
          const label = makeLabel(THREE, `${year}`, "年", "");
          label.position.set(-planeWidth / 2 + 70, y, -430);
          scene.add(label);
          const tickGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-planeWidth / 2 + 105, y, -420),
            new THREE.Vector3(-planeWidth / 2 + 145, y, -420)
          ]);
          scene.add(new THREE.Line(tickGeo, new THREE.LineBasicMaterial({ color: 0xdadce0, transparent: true, opacity: .9 })));
        }

        events.forEach((event, index) => {
          const catIndex = Math.max(0, categories.indexOf(event.category));
          const x = categoryBaseX - ((categories.length - 1) * categoryGap) / 2 + catIndex * categoryGap;
          const y = minYear === maxYear ? 80 : -170 + ((new Date(event.at).getFullYear() - minYear) / yearRange) * 560;
          const z = colorDepth(event.colorName, colorGroups) + (index % 4) * 18;
          const card = makeEvent3DCard(THREE, event);
          card.position.set(x, y, z);
          scene.add(card);
          selectable.push(card);
        });

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const renderFrame = () => {
          controls.update();
          renderer.render(scene, camera);
        };
        const animate = () => {
          if (!tag3dRuntime || tag3dRuntime.renderer !== renderer) return;
          renderFrame();
          requestAnimationFrame(animate);
        };
        tag3dRuntime = { THREE, renderer, scene, camera, controls, raycaster, pointer, selectable, selectedObject: null, renderFrame };
        wireTag3DSceneEvents(canvas);
        animate();
      } catch (error) {
        console.error(error);
        toast("タグ3Dシーンの描画に失敗しました");
      }
    }

    async function loadThreeBundle() {
      const localUrl = new URL("./vendor/three/three.module.js", document.baseURI).href;
      const localControlsUrl = new URL("./vendor/three/examples/jsm/controls/OrbitControls.js", document.baseURI).href;
      try {
        const response = await fetch(localUrl, { method: "HEAD", cache: "no-store" });
        const controlsResponse = await fetch(localControlsUrl, { method: "HEAD", cache: "no-store" });
        if (response.ok && controlsResponse.ok) {
          const THREE = await import(localUrl);
          const { OrbitControls } = await import(localControlsUrl);
          return { THREE, OrbitControls };
        }
      } catch (error) {
        // CDN fallback below keeps GitHub Pages builds working when vendor files are absent.
      }
      const THREE = await import("https://esm.sh/three@0.160.0");
      const { OrbitControls } = await import("https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js");
      return { THREE, OrbitControls };
    }

    function setTag3DCamera(camera) {
      const positions = {
        front: [760, 720, 1120],
        top: [0, 1480, 120],
        bottom: [0, -1260, 720],
        left: [-1260, 620, 340],
        right: [1260, 620, 340],
        back: [-760, 720, -1120]
      };
      const [x, y, z] = positions[tag3dView] || positions.front;
      camera.position.set(x, y, z);
      camera.lookAt(0, -120, 60);
      if ("zoom" in camera) {
        camera.zoom = .82;
        camera.updateProjectionMatrix();
      }
    }

    function get3DBoardEvents(notes) {
      const granularity = el.granularitySelect.value;
      return notes.flatMap(note => {
        const category = el.classifySelect.value === "tag" ? (firstTag(note) || "タグなし") : colorName(note.color);
        return note.history
          .filter(event => {
            if (granularity === "all") return true;
            if (granularity === "note") return event.type === "create" || event.type === "full";
            return event.type === granularity;
          })
          .map(event => ({
            ...event,
            noteId: note.id,
            noteTitle: note.title,
            category,
            color: note.color,
            colorName: colorName(note.color),
            preview: event.value || note.text
          }));
      }).sort((a, b) => new Date(b.at) - new Date(a.at));
    }

    function colorDepth(color, colorGroups) {
      const index = Math.max(0, colorGroups.indexOf(color));
      return -360 + index * 120;
    }

    function colorName(color) {
      const entries = [
        ["#fff8c7", "黄"],
        ["#d7f0ff", "青"],
        ["#e2f4d7", "緑"],
        ["#fce3ef", "桃"],
        ["#e8e0ff", "紫"],
        ["#ffe3c2", "橙"],
        ["#dff3ec", "青緑"]
      ];
      return entries.find(([value]) => value.toLowerCase() === String(color).toLowerCase())?.[1] || "その他";
    }

    function makeEvent3DCard(THREE, event) {
      const group = new THREE.Group();
      const geometry = new THREE.BoxGeometry(240, 104, 16);
      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color(event.color || "#fff8c7"),
        roughness: .58,
        metalness: .03
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.cardMesh = true;
      group.add(mesh);

      const label = makeCardTextureLabel(THREE, {
        title: `${typeLabel[event.type] || event.type}: ${event.noteTitle}`,
        text: `${formatDate(event.at)} ${event.preview || ""}`,
        tags: [event.category]
      });
      label.position.set(0, 0, 8);
      label.scale.set(230, 92, 1);
      group.add(label);

      group.userData.event = event;
      group.userData.mesh = mesh;
      group.userData.baseScale = 1;
      return group;
    }

    function wireTag3DSceneEvents(canvas) {
      let down = null;
      canvas.addEventListener("pointerdown", (event) => {
        down = { x: event.clientX, y: event.clientY, at: Date.now() };
        const card = pickTag3DCard(event) || tag3dRuntime?.selectedObject;
        if (!card?.userData?.event?.noteId) return;
        const noteId = card.userData.event.noteId;
        if (lastTag3DClick?.noteId === noteId && down.at - lastTag3DClick.at < 650) {
          event.preventDefault();
          openTag3DCardIn2D(card);
        }
      });
      canvas.addEventListener("click", (event) => {
        if (!down || Math.hypot(event.clientX - down.x, event.clientY - down.y) > 5) return;
        const clickedAt = Date.now();
        const card = pickTag3DCard(event);
        if (!card) {
          if (tag3dRuntime?.selectedObject) {
            openTag3DCardIn2D(tag3dRuntime.selectedObject);
          }
          return;
        }
        const noteId = card.userData.event.noteId;
        const alreadySelected = tag3dRuntime?.selectedObject?.userData?.event?.noteId === noteId;
        const isDouble = alreadySelected || (lastTag3DClick?.noteId === noteId && clickedAt - lastTag3DClick.at < 650);
        selectTag3DCard(card);
        lastTag3DClick = { noteId, at: clickedAt };
        if (isDouble) openTag3DCardIn2D(card);
      });
      canvas.addEventListener("dblclick", (event) => {
        const card = pickTag3DCard(event) || tag3dRuntime?.selectedObject;
        openTag3DCardIn2D(card);
      });
    }

    function openTag3DCardIn2D(card) {
      if (!card?.userData?.event?.noteId) return;
      selectedId = card.userData.event.noteId;
      boardMode = "2d";
      lastTag3DClick = null;
      el.view2DBtn.classList.add("active");
      el.view3DBtn.classList.remove("active");
      el.arrangeSelect.hidden = false;
      el.granularitySelect.hidden = true;
      el.classifySelect.hidden = true;
      persist();
      render();
      const target = findNote(selectedId);
      toast(target ? `${target.title} を2Dで開きました。編集すると新しい履歴として追加されます。` : "2Dに戻りました");
    }

    function pickTag3DCard(event) {
      const runtime = tag3dRuntime;
      if (!runtime) return null;
      const rect = runtime.renderer.domElement.getBoundingClientRect();
      runtime.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      runtime.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      runtime.raycaster.setFromCamera(runtime.pointer, runtime.camera);
      const hits = runtime.raycaster.intersectObjects(runtime.selectable, true);
      const hit = hits.find(item => nearestTag3DCard(item.object));
      return hit ? nearestTag3DCard(hit.object) : null;
    }

    function nearestTag3DCard(object) {
      let current = object;
      while (current) {
        if (current.userData?.event) return current;
        current = current.parent;
      }
      return null;
    }

    function selectTag3DCard(card) {
      const runtime = tag3dRuntime;
      if (!runtime) return;
      if (runtime.selectedObject && runtime.selectedObject !== card) {
        setTag3DCardHighlight(runtime.selectedObject, false);
      }
      runtime.selectedObject = card;
      selectedId = card.userData.event.noteId;
      runtime.renderer.domElement.dataset.selected3d = selectedId;
      persist();
      setTag3DCardHighlight(card, true);
      renderSidePanel();
      runtime.renderFrame?.();
    }

    function setTag3DCardHighlight(card, active) {
      const mesh = card.userData?.mesh;
      if (mesh?.material) {
        mesh.material.emissive = active ? new tag3dRuntime.THREE.Color(0x1a73e8) : new tag3dRuntime.THREE.Color(0x000000);
        mesh.material.emissiveIntensity = active ? .28 : 0;
        mesh.material.needsUpdate = true;
      }
      card.scale.setScalar(active ? 1.14 : 1);
    }

    function makeCardTextureLabel(THREE, note) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 360;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(255,255,255,.0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#202124";
      ctx.font = "bold 34px system-ui, sans-serif";
      ctx.fillText(note.title.slice(0, 18), 30, 56);
      ctx.fillStyle = "#5f6368";
      ctx.font = "22px system-ui, sans-serif";
      wrapCanvasText(ctx, note.text || "", 30, 102, 450, 30, 4);
      ctx.fillStyle = "#174ea6";
      ctx.font = "bold 20px system-ui, sans-serif";
      ctx.fillText((note.tags || []).slice(0, 3).join("  "), 30, 318);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(182, 70, 1);
      return sprite;
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text).replace(/\n/g, " ").split(/\s+/).filter(Boolean);
      let line = "";
      let lines = 0;
      for (const word of words) {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          lines += 1;
          line = word;
          if (lines >= maxLines) return;
        } else {
          line = testLine;
        }
      }
      if (line && lines < maxLines) ctx.fillText(line, x, y);
    }

    async function openTimeline() {
      el.timelineOverlay.classList.add("open");
      await initTimeline();
      renderTimelineScene();
      resizeTimeline();
      toast("3D年表を開きました");
    }

    function closeTimeline() {
      el.timelineOverlay.classList.remove("open");
    }

    async function initTimeline() {
      if (threeRuntime) return;
      try {
        const THREE = await import(new URL("./vendor/three/three.module.js", document.baseURI).href);
        const { OrbitControls } = await import(new URL("./vendor/three/examples/jsm/controls/OrbitControls.js", document.baseURI).href);
        const renderer = new THREE.WebGLRenderer({ canvas: el.timeline3d, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x111827, 1);
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x111827, 580, 1420);
        const camera = new THREE.PerspectiveCamera(50, 1, 1, 3000);
        camera.position.set(0, 360, 620);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x334155, 2.2));
        const light = new THREE.DirectionalLight(0xffffff, 1.8);
        light.position.set(260, 420, 280);
        scene.add(light);
        threeRuntime = { THREE, renderer, scene, camera, controls, objects: [] };
        window.addEventListener("resize", resizeTimeline);
        animateTimeline();
      } catch (error) {
        console.error(error);
        toast("3D年表の読み込みに失敗しました");
      }
    }

    function resizeTimeline() {
      if (!threeRuntime) return;
      const rect = el.timeline3d.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      threeRuntime.camera.aspect = rect.width / rect.height;
      threeRuntime.camera.updateProjectionMatrix();
      threeRuntime.renderer.setSize(rect.width, rect.height, false);
    }

    function animateTimeline() {
      if (!threeRuntime) return;
      requestAnimationFrame(animateTimeline);
      threeRuntime.controls.update();
      threeRuntime.objects.forEach((obj, i) => {
        obj.rotation.y += 0.002 + (i % 4) * 0.0004;
      });
      threeRuntime.renderer.render(threeRuntime.scene, threeRuntime.camera);
    }

    function renderTimelineScene() {
      if (!threeRuntime) return;
      const { THREE, scene } = threeRuntime;
      threeRuntime.objects.forEach(obj => scene.remove(obj));
      threeRuntime.objects = [];

      const scope = el.timelineScope.value;
      const events = state.notes.flatMap((note, noteIndex) => note.history.map(event => ({
        ...event,
        noteTitle: note.title,
        noteIndex
      }))).filter(event => {
        if (scope === "all") return true;
        if (scope === "note") return event.type === "create" || event.type === "full";
        return event.type === scope;
      }).sort((a, b) => new Date(a.at) - new Date(b.at));

      const times = events.map(event => new Date(event.at).getTime());
      const min = Math.min(...times, Date.now());
      const max = Math.max(...times, min + 1);
      const range = Math.max(1, max - min);

      addGrid(THREE, scene, threeRuntime.objects);
      addAxisLabels(THREE, scene, threeRuntime.objects, min, max);

      events.forEach((event, index) => {
        const x = ((new Date(event.at).getTime() - min) / range - 0.5) * 760;
        const y = 120 - event.noteIndex * 58;
        const z = typeDepth[event.type] ?? 0;
        const radius = event.type === "word" ? 8 : event.type === "paragraph" ? 13 : 18;
        const geometry = event.type === "word"
          ? new THREE.SphereGeometry(radius, 24, 16)
          : new THREE.BoxGeometry(radius * 1.8, radius * 1.8, radius * 1.8);
        const material = new THREE.MeshStandardMaterial({
          color: typeColor[event.type] || 0xffffff,
          roughness: .42,
          metalness: .08,
          emissive: typeColor[event.type] || 0xffffff,
          emissiveIntensity: .08
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        threeRuntime.objects.push(mesh);

        const label = makeLabel(THREE, `${typeLabel[event.type]}: ${event.label}`.slice(0, 34), event.noteTitle, formatDateTime(event.at));
        label.position.set(x, y + 30, z);
        scene.add(label);
        threeRuntime.objects.push(label);

        if (index > 0) {
          const prev = events[index - 1];
          const px = ((new Date(prev.at).getTime() - min) / range - 0.5) * 760;
          const py = 120 - prev.noteIndex * 58;
          const pz = typeDepth[prev.type] ?? 0;
          const lineGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(px, py, pz),
            new THREE.Vector3(x, y, z)
          ]);
          const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: .18 }));
          scene.add(line);
          threeRuntime.objects.push(line);
        }
      });
    }

    function addGrid(THREE, scene, objects) {
      const grid = new THREE.GridHelper(860, 20, 0x94a3b8, 0x334155);
      grid.position.y = -170;
      grid.rotation.x = Math.PI / 2;
      scene.add(grid);
      objects.push(grid);

      const axisMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: .45 });
      const axis = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-430, -170, 0),
        new THREE.Vector3(430, -170, 0)
      ]);
      const line = new THREE.Line(axis, axisMat);
      scene.add(line);
      objects.push(line);

      Object.entries(typeDepth).forEach(([type, z]) => {
        const lane = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(-430, -170, z),
          new THREE.Vector3(430, -170, z)
        ]);
        const laneLine = new THREE.Line(lane, new THREE.LineBasicMaterial({ color: typeColor[type], transparent: true, opacity: .5 }));
        scene.add(laneLine);
        objects.push(laneLine);
        const label = makeLabel(THREE, typeLabel[type], "", "");
        label.position.set(-455, -150, z);
        scene.add(label);
        objects.push(label);
      });
    }

    function addAxisLabels(THREE, scene, objects, min, max) {
      const start = makeLabel(THREE, "開始", "", formatDateTime(new Date(min).toISOString()));
      start.position.set(-410, -130, -145);
      const end = makeLabel(THREE, "最新", "", formatDateTime(new Date(max).toISOString()));
      end.position.set(360, -130, -145);
      scene.add(start, end);
      objects.push(start, end);
    }

    function makeLabel(THREE, line1, line2, line3) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 160;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(255,255,255,.88)";
      roundRect(ctx, 8, 8, 496, 144, 18);
      ctx.fill();
      ctx.fillStyle = "#111827";
      ctx.font = "bold 28px system-ui, sans-serif";
      ctx.fillText(line1 || "", 24, 50);
      ctx.fillStyle = "#374151";
      ctx.font = "22px system-ui, sans-serif";
      if (line2) ctx.fillText(line2.slice(0, 32), 24, 88);
      ctx.fillStyle = "#6b7280";
      ctx.font = "18px system-ui, sans-serif";
      if (line3) ctx.fillText(line3, 24, 122);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(112, 35, 1);
      return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('"', "&quot;");
    }

    function formatDate(iso) {
      return new Intl.DateTimeFormat("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(new Date(iso));
    }

    function formatDateTime(iso) {
      return new Intl.DateTimeFormat("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" }).format(new Date(iso));
    }

    function toast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.toast.classList.remove("show"), 1800);
    }

    function iconPin() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m14 4 6 6-4 1-4 9-2-2 4-9-1-1-9 4-2-2 9-4 1-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    }
    function iconImage() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 5h16v14H4z" stroke="currentColor" stroke-width="1.8"/><path d="m7 16 4-4 3 3 2-2 3 3M8.5 9.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconHistory() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12a8 8 0 1 0 2.4-5.7M4 5v5h5M12 8v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconNested() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 6h6v6H5zM13 12h6v6h-6zM11 9h3a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    }
    function iconSelect() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 4 4L19 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconMove() {
      return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v18M3 12h18M12 3 8 7M12 3l4 4M12 21l-4-4M12 21l4-4M3 12l4-4M3 12l4 4M21 12l-4-4M21 12l-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    function iconPlus() {
      return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
    }
    function iconTrash() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
  </script>
